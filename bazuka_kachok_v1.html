<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>БАЗУКА КАЧОК: ФИКСИРОВАННАЯ СКОРОСТЬ + АНИМАЦИЯ ВЗРЫВОВ</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1225 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Press Start 2P', monospace;
        }

        .game-container {
            background: #000000aa;
            border-radius: 32px;
            padding: 20px 30px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 0 0 4px #ff8800, 0 0 0 8px #3a2a1a;
            cursor: crosshair;
            background-color: #0a0a1a;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 16px;
            color: #ffd966;
            text-shadow: 2px 2px 0 #7a2e00;
            font-weight: bold;
            font-size: 18px;
            background: #11171fcc;
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            flex-wrap: wrap;
            gap: 10px;
        }

        .score-box, .health-box {
            background: #000000aa;
            padding: 5px 16px;
            border-radius: 32px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .controls-tip {
            font-size: 12px;
            background: #2e241f;
            padding: 6px 16px;
            border-radius: 24px;
            color: #f5bc70;
            font-family: monospace;
            font-weight: bold;
            white-space: nowrap;
        }

        button {
            background: #ff9f4a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 4px 0 #8b3c00;
            transition: 0.07s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #8b3c00;
        }

        .sound-toggle, .pause-btn, .ai-toggle-btn {
            background: #3a2a1f;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.1s linear;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .sound-toggle:hover, .pause-btn:hover, .ai-toggle-btn:hover {
            background: #5e3e2a;
        }
        .ai-toggle-btn.ai-active {
            background: #2a5a3a;
            box-shadow: 0 0 8px #44ff44;
            color: #aaffaa;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2a1a0a;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 13px;
            white-space: nowrap;
        }
        .slider-container input {
            width: 130px;
            cursor: pointer;
        }
        .slider-container span {
            min-width: 65px;
            text-align: center;
        }
        
        .pause-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            font-family: monospace;
            font-size: 48px;
            color: #ffaa44;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .pause-overlay.hidden {
            display: none;
        }

        /* Экран выбора персонажа */
        .character-select {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            font-family: monospace;
        }
        .character-select.hidden {
            display: none;
        }
        .select-container {
            background: #2a1a0a;
            border-radius: 48px;
            padding: 30px 50px;
            text-align: center;
            border: 3px solid #ffaa44;
            box-shadow: 0 0 30px rgba(255,170,68,0.3);
        }
        .select-container h1 {
            color: #ffd966;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #7a2e00;
        }
        .characters {
            display: flex;
            gap: 60px;
            justify-content: center;
            margin-bottom: 30px;
        }
        .char-card {
            background: #1a1a1a;
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: 0.2s ease;
            border: 3px solid #5a4a3a;
            text-align: center;
        }
        .char-card:hover {
            transform: scale(1.05);
            border-color: #ffaa44;
            background: #2a2a2a;
        }
        .char-card.selected {
            border-color: #ffaa44;
            box-shadow: 0 0 15px #ffaa44;
            background: #2a2a2a;
        }
        .char-preview {
            width: 200px;
            height: 220px;
            position: relative;
            margin-bottom: 15px;
            background: #0a0a1a;
            border-radius: 12px;
            overflow: visible;
        }
        .char-preview canvas {
            width: 100%;
            height: 100%;
            border-radius: 0;
            box-shadow: none;
            background: transparent;
        }
        .char-card span {
            color: #ffd966;
            font-size: 20px;
            display: block;
        }
        .start-btn {
            background: #ff9f4a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            font-size: 24px;
            padding: 12px 40px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 6px 0 #8b3c00;
            transition: 0.07s linear;
            color: #2a1a0a;
            margin-top: 10px;
        }
        .start-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #8b3c00;
        }
    </style>
</head>
<body>
<div class="character-select" id="characterSelect">
    <div class="select-container">
        <h1>⚡ ВЫБЕРИ ПЕРСОНАЖА ⚡</h1>
        <div class="characters">
            <div class="char-card" id="selectKachok">
                <div class="char-preview">
                    <canvas id="previewKachok" width="200" height="220"></canvas>
                </div>
                <span>💪 КАЧОК</span>
            </div>
            <div class="char-card" id="selectSnezhana">
                <div class="char-preview">
                    <canvas id="previewSnezhana" width="200" height="220"></canvas>
                </div>
                <span>🕶️ СНЕЖАНА</span>
            </div>
        </div>
        <button class="start-btn" id="startGameBtn">▶ НАЧАТЬ ИГРУ ◀</button>
    </div>
</div>

<div class="game-container" style="display: none;" id="gameContainer">
    <canvas id="gameCanvas" width="1000" height="500"></canvas>
    <div class="info-panel">
        <div class="score-box">💪 СЧЁТ: <span id="scoreValue">0</span></div>
        <div class="health-box">❤️ ЗДОРОВЬЕ: <span id="healthValue">5</span></div>
        <div class="controls-tip">A/D → ходьба | W → прыжок | ЛКМ → ВКЛ/ВЫКЛ АВТО-ОЧЕРЕДЬ</div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <div class="slider-container">
                <span>🐉 КОЛИЧЕСТВО МОНСТРОВ</span>
                <input type="range" id="densitySlider" min="0" max="100" value="50">
                <span id="densityValue">НОРМ</span>
            </div>
            <div id="aiToggleBtn" class="ai-toggle-btn">🤖 АВТОИГРА ВЫКЛ</div>
            <div id="soundToggleBtn" class="sound-toggle">🔊 ЗВУК ВКЛ</div>
            <div id="pauseBtn" class="pause-btn">⏸ ПАУЗА</div>
            <button id="resetBtn">⚡ ЗАНОВО</button>
        </div>
    </div>
</div>
<div id="pauseOverlay" class="pause-overlay hidden">
    ⏸ ПАУЗА ⏸<br>
    <span style="font-size: 20px;">Нажмите "ПАУЗА" снова или пробел</span>
</div>

<script>
    (function(){
        // ========== ПЕРЕМЕННЫЕ ВЫБОРА ПЕРСОНАЖА ==========
        let selectedCharacter = 'kachok';
        
        // ========== НАСТРОЙКИ ОТОБРАЖЕНИЯ ПРЕВЬЮ ==========
        const KACHOK_PREVIEW = { scale: 1.5, offsetX: 0, offsetY: -50 };
        const SNEZHANA_PREVIEW = { scale: 1.5, offsetX: 0, offsetY: -47 };
        
        // ========== ФИКСИРОВАННАЯ СКОРОСТЬ КАЧКА (px/кадр) ==========
        const FIXED_MAX_SPEED = 1.65;
        
        // ========== АНИМАЦИИ ВЗРЫВОВ ==========
        let activeExplosions = [];
        
        function createGroundExplosion(centerX, centerY) {
            const particles = [];
            const count = 14;
            const duration = 12;
            const speed = 7;
            for(let i = 0; i < count; i++) {
                let vx = (Math.random() - 0.5) * speed * 2;
                let vy = (Math.random() - 0.5) * speed * 1.5;
                let size = 3 + Math.random() * 6;
                particles.push({
                    x: centerX, y: centerY, vx: vx, vy: vy, size: size, color: "#ff3333", life: duration
                });
            }
            activeExplosions.push({ particles: particles, frame: 0, duration: duration, type: "ground" });
        }
        
        function createFlyingExplosion(centerX, centerY) {
            const particles = [];
            const count = 12;
            const duration = 15;
            const speed = 7;
            for(let i = 0; i < count; i++) {
                let vx = (Math.random() - 0.5) * speed * 2;
                let vy = (Math.random() - 0.5) * speed * 2;
                let size = 3 + Math.random() * 6;
                particles.push({
                    x: centerX, y: centerY, vx: vx, vy: vy, size: size, color: "#8b3a4a", life: duration
                });
            }
            activeExplosions.push({ particles: particles, frame: 0, duration: duration, type: "flying" });
        }
        
        function updateExplosions() {
            for(let i = 0; i < activeExplosions.length; i++) {
                const exp = activeExplosions[i];
                exp.frame++;
                let anyAlive = false;
                for(let p of exp.particles) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life--;
                    if(p.life > 0) anyAlive = true;
                }
                if(!anyAlive || exp.frame >= exp.duration) {
                    activeExplosions.splice(i,1);
                    i--;
                }
            }
        }
        
        function drawExplosions(ctx, cameraX, canvasWidth) {
            for(let exp of activeExplosions) {
                for(let p of exp.particles) {
                    if(p.life <= 0) continue;
                    const screenX = p.x - cameraX + canvasWidth/2;
                    const screenY = p.y;
                    const alpha = Math.min(1, p.life / exp.duration * 0.8 + 0.2);
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.ellipse(screenX, screenY, p.size, p.size * 0.8, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.restore();
                }
            }
        }
        
        // ========== ЗВУКИ ==========
        let soundExplosionCtx = null;
        
        function initSoundExplosion() {
            if (soundExplosionCtx) return;
            soundExplosionCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playSoundFirePop(volume = 0.5) {
            try {
                if (!soundExplosionCtx) initSoundExplosion();
                if (soundExplosionCtx.state === 'suspended') soundExplosionCtx.resume();
                const now = soundExplosionCtx.currentTime;
                const gain = soundExplosionCtx.createGain();
                gain.connect(soundExplosionCtx.destination);
                gain.gain.setValueAtTime(volume, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
                const osc1 = soundExplosionCtx.createOscillator();
                osc1.type = 'sawtooth';
                osc1.frequency.value = 300;
                osc1.connect(gain);
                osc1.start();
                osc1.stop(now + 0.2);
                const osc2 = soundExplosionCtx.createOscillator();
                osc2.type = 'square';
                osc2.frequency.value = 150;
                osc2.connect(gain);
                osc2.start();
                osc2.stop(now + 0.15);
                const bufSize = soundExplosionCtx.sampleRate * 0.08;
                const buf = soundExplosionCtx.createBuffer(1, bufSize, soundExplosionCtx.sampleRate);
                const data = buf.getChannelData(0);
                for(let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = soundExplosionCtx.createBufferSource();
                noise.buffer = buf;
                noise.connect(gain);
                noise.start();
                noise.stop(now + 0.08);
            } catch(e) {}
        }
        
        function playSoundSplat(volume = 0.5) {
            try {
                if (!soundExplosionCtx) initSoundExplosion();
                if (soundExplosionCtx.state === 'suspended') soundExplosionCtx.resume();
                const now = soundExplosionCtx.currentTime;
                const gain = soundExplosionCtx.createGain();
                gain.connect(soundExplosionCtx.destination);
                gain.gain.setValueAtTime(volume, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
                const osc = soundExplosionCtx.createOscillator();
                osc.type = 'sine';
                osc.frequency.value = 60;
                osc.connect(gain);
                osc.start();
                osc.stop(now + 0.25);
                const bufSize = soundExplosionCtx.sampleRate * 0.15;
                const buf = soundExplosionCtx.createBuffer(1, bufSize, soundExplosionCtx.sampleRate);
                const data = buf.getChannelData(0);
                for(let i = 0; i < bufSize; i++) data[i] = (Math.random() - 0.5) * 1.5;
                const noise = soundExplosionCtx.createBufferSource();
                noise.buffer = buf;
                noise.connect(gain);
                noise.start();
                noise.stop(now + 0.12);
            } catch(e) {}
        }
        
        function playSoundSynth(volume = 0.4) {
            try {
                if (!soundExplosionCtx) initSoundExplosion();
                if (soundExplosionCtx.state === 'suspended') soundExplosionCtx.resume();
                const now = soundExplosionCtx.currentTime;
                const gain = soundExplosionCtx.createGain();
                gain.connect(soundExplosionCtx.destination);
                gain.gain.setValueAtTime(volume, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.2);
                const osc1 = soundExplosionCtx.createOscillator();
                osc1.type = 'sine';
                osc1.frequency.value = 220;
                osc1.connect(gain);
                osc1.start();
                osc1.stop(now + 0.2);
                const osc2 = soundExplosionCtx.createOscillator();
                osc2.type = 'triangle';
                osc2.frequency.value = 330;
                osc2.connect(gain);
                osc2.start();
                osc2.stop(now + 0.1);
            } catch(e) {}
        }
        
        function drawPreviewKachok(ctx, w, h, settings) {
            ctx.clearRect(0, 0, w, h);
            const scale = settings.scale;
            const offsetX = settings.offsetX;
            const offsetY = settings.offsetY;
            const baseX = w/2 - 22 * scale + offsetX;
            const baseY = h - 48 + offsetY;
            ctx.fillStyle = "#1a1a1a80";
            ctx.beginPath();
            ctx.ellipse(baseX+22*scale, baseY+50*scale, 18*scale, 6*scale, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#b87c4f";
            ctx.beginPath(); ctx.roundRect(baseX+8*scale, baseY+40*scale, 8*scale, 16*scale, 4*scale); ctx.fill();
            ctx.beginPath(); ctx.roundRect(baseX+44*scale-16*scale, baseY+40*scale, 8*scale, 16*scale, 4*scale); ctx.fill();
            ctx.fillStyle = "#9b5e3a";
            ctx.beginPath(); ctx.roundRect(baseX+6*scale, baseY+46*scale, 7*scale, 12*scale, 4*scale); ctx.fill();
            ctx.beginPath(); ctx.roundRect(baseX+44*scale-14*scale, baseY+46*scale, 7*scale, 12*scale, 4*scale); ctx.fill();
            ctx.fillStyle = "#e0ac77";
            ctx.beginPath(); ctx.roundRect(baseX+6*scale, baseY+18*scale, 32*scale, 30*scale, 12*scale); ctx.fill();
            ctx.fillStyle = "#c9905a";
            ctx.beginPath(); ctx.ellipse(baseX+12*scale, baseY+30*scale, 7*scale, 10*scale, 0, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(baseX+32*scale, baseY+30*scale, 7*scale, 10*scale, 0, 0, Math.PI*2); ctx.fill();
            for(let i=0;i<3;i++) { ctx.fillStyle = "#b57a48"; ctx.fillRect(baseX+15*scale, baseY+38*scale + i*5*scale, 14*scale, 3*scale); }
            ctx.fillStyle = "#e0a86a";
            ctx.beginPath();
            ctx.ellipse(baseX+22*scale, baseY+12*scale, 15*scale, 17*scale, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#8b3a2a";
            ctx.beginPath();
            ctx.moveTo(baseX+14*scale, baseY+6*scale);
            ctx.lineTo(baseX+20*scale, baseY+2*scale);
            ctx.lineTo(baseX+18*scale, baseY+10*scale);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(baseX+30*scale, baseY+6*scale);
            ctx.lineTo(baseX+24*scale, baseY+2*scale);
            ctx.lineTo(baseX+26*scale, baseY+10*scale);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(baseX+10*scale, baseY+8*scale);
            ctx.lineTo(baseX+18*scale, baseY+12*scale);
            ctx.lineTo(baseX+17*scale, baseY+14*scale);
            ctx.fillStyle = "#2a1a0a";
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(baseX+34*scale, baseY+8*scale);
            ctx.lineTo(baseX+26*scale, baseY+12*scale);
            ctx.lineTo(baseX+27*scale, baseY+14*scale);
            ctx.fill();
            ctx.fillStyle = "#ff4444";
            ctx.beginPath(); ctx.arc(baseX+16*scale, baseY+13*scale, 4*scale, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(baseX+28*scale, baseY+13*scale, 4*scale, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000000";
            ctx.beginPath(); ctx.arc(baseX+15.5*scale, baseY+12.5*scale, 2*scale, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(baseX+27.5*scale, baseY+12.5*scale, 2*scale, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#ffffff";
            ctx.beginPath(); ctx.arc(baseX+14.5*scale, baseY+11.5*scale, 0.9*scale, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(baseX+26.5*scale, baseY+11.5*scale, 0.9*scale, 0, Math.PI*2); ctx.fill();
            ctx.beginPath();
            ctx.moveTo(baseX+9*scale, baseY+10*scale);
            ctx.lineTo(baseX+17*scale, baseY+18*scale);
            ctx.lineTo(baseX+15*scale, baseY+20*scale);
            ctx.fillStyle = "#5a2a1a";
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(baseX+17*scale, baseY+18*scale);
            ctx.lineTo(baseX+19*scale, baseY+16*scale);
            ctx.lineTo(baseX+15*scale, baseY+20*scale);
            ctx.fill();
            ctx.fillStyle = "#cc3333";
            ctx.beginPath();
            ctx.ellipse(baseX+33*scale, baseY+18*scale, 3*scale, 2*scale, 0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#992222";
            ctx.beginPath();
            ctx.ellipse(baseX+34*scale, baseY+17.5*scale, 1.5*scale, 1*scale, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(baseX+17*scale, baseY+24*scale);
            ctx.lineTo(baseX+27*scale, baseY+24*scale);
            ctx.lineWidth = 2.5*scale;
            ctx.strokeStyle = "#4a1a0a";
            ctx.stroke();
            ctx.fillStyle = "#c92a2a";
            ctx.fillRect(baseX+6*scale, baseY+3*scale, 32*scale, 8*scale);
            ctx.fillStyle = "#ffd966";
            for(let i=0;i<3;i++) ctx.fillRect(baseX+10*scale + i*9*scale, baseY+2*scale, 4*scale, 3*scale);
            ctx.fillStyle = "#d4a06a";
            ctx.beginPath(); ctx.roundRect(baseX-8*scale, baseY+24*scale, 12*scale, 18*scale, 8*scale); ctx.fill();
            ctx.beginPath(); ctx.roundRect(baseX+40*scale, baseY+24*scale, 12*scale, 18*scale, 8*scale); ctx.fill();
            ctx.fillStyle = "#4a6b2f";
            ctx.fillRect(baseX+36*scale, baseY+32*scale, 20*scale, 10*scale);
            ctx.fillStyle = "#ffaa44";
            ctx.beginPath();
            ctx.arc(baseX+56*scale, baseY+37*scale, 5*scale, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#6a4a2a";
            ctx.fillRect(baseX+6*scale, baseY+46*scale, 32*scale, 8*scale);
            for(let i=0;i<4;i++) { ctx.fillStyle = "#ffbb33"; ctx.fillRect(baseX+10*scale+i*8*scale, baseY+47*scale, 3*scale, 6*scale); }
        }
        
        function drawPreviewSnezhana(ctx, w, h, settings) {
            ctx.clearRect(0, 0, w, h);
            const scale = settings.scale;
            const offsetX = settings.offsetX;
            const offsetY = settings.offsetY;
            const x = w/2 - 22 * scale + offsetX;
            const y = h - 52 + offsetY;
            const thighW = 2 * scale;
            const calfW = 3 * scale;
            const bootsH = 15 * scale;
            const bodyW = 21 * scale;
            const bodyLeft = x + (44*scale - bodyW)/2;
            const thighTopY = y + 44 * scale;
            const thighBottomY = y + 52 * scale;
            const calfTopY = y + 52 * scale;
            const calfBottomY = y + 62 * scale;
            const ankleY = y + 62 * scale;
            ctx.fillStyle = "#f4c2a1";
            ctx.beginPath();
            ctx.roundRect(x + 14 * scale, thighTopY, thighW, thighBottomY - thighTopY, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(x + 12 * scale, calfTopY, calfW, calfBottomY - calfTopY, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(x + 27 * scale, thighTopY, thighW, thighBottomY - thighTopY, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(x + 28 * scale, calfTopY, calfW, calfBottomY - calfTopY, 3);
            ctx.fill();
            const bootTopY = ankleY - bootsH;
            ctx.fillStyle = "#1a1a1a";
            ctx.beginPath();

        function startGame(character) {
            let audioCtx = null;

            function initAudio() {

            function playBeep(type, volume = 0.3) {
                if (!soundEnabled || isPaused) return;
                if (!audioCtx) {
                    initAudio();
                    if (audioCtx.state === 'suspended') {
                        audioCtx.resume().then(() => playBeep(type, volume));

                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(() => playBeep(type, volume));

                }
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                gain.connect(audioCtx.destination);
                let freq = 440;
                let duration = 0.2;
                switch(type) {
                    case 'shoot': freq = 180; duration = 0.2; osc.type = 'sawtooth'; break;
                    case 'explode': freq = 100; duration = 0.28; osc.type = 'triangle'; break;
                    case 'jump': freq = 620; duration = 0.18; osc.type = 'sine'; break;
                    case 'hurt': freq = 120; duration = 0.35; osc.type = 'square'; break;
                    case 'fireball': freq = 250; duration = 0.15; osc.type = 'sine'; break;
                    case 'gameover': freq = 80; duration = 0.9; osc.type = 'sawtooth'; break;
                    default: return;
                }
                gain.gain.setValueAtTime(volume, now);

                osc.start();
                osc.stop(now + duration);
            }
            
            function soundShoot() { playBeep('shoot', 0.35); }

            function isFullyOnScreen(worldX, width) {
                const screenLeft = cameraX - CANVAS_WIDTH/2;
                const screenRight = cameraX + CANVAS_WIDTH/2;
                return (worldX >= screenLeft && worldX + width <= screenRight);
            }
            
            function calculateApproachSpeed(targetX, targetY, targetVx, targetVy, playerX, playerY, playerVx, playerVy) {
                if (playerX > targetX) {
                    let vsx = targetVx - playerVx;
                    let vsy = targetVy - playerVy;
                    if (vsx < 0) return 0;
                    return Math.hypot(vsx, vsy);
                } else {
                    let vsx = -targetVx + playerVx;
                    let vsy = targetVy - playerVy;
                    if (vsx < 0) return 0;
                    return Math.hypot(vsx, vsy);
                }
            }
            
            function calculateSingleDanger(targetWorldX, targetWorldY, targetVx, targetVy, healthVal) {
                const playerX = player.worldX + PLAYER_WIDTH/2;
                const playerY = player.y + PLAYER_HEIGHT/2;
                const playerVx = player.vx;
                let approachSpeed = calculateApproachSpeed(targetWorldX, targetWorldY, targetVx, targetVy, playerX, playerY, playerVx, 0);
                let dx = targetWorldX - playerX;
                let dy = targetWorldY - playerY;
                let distance = Math.hypot(dx, dy);
                if (distance < 1) distance = 1;
                let danger = (approachSpeed * healthVal) / distance;
                const playerVxSign = Math.sign(playerVx);
                const targetVxSign = Math.sign(targetVx);
                if (playerVxSign !== 0 && targetVxSign !== 0 && playerVxSign === targetVxSign) danger *= 3;
                return Math.max(0, danger);
            }
            
            function evaluateLeftRightDanger() {
                const playerCenter = player.worldX + PLAYER_WIDTH/2;
                let leftDanger = 0, rightDanger = 0;
                function addDanger(worldX, worldY, vx, vy, health) {
                    const danger = calculateSingleDanger(worldX, worldY, vx, vy, health);
                    if (worldX < playerCenter) leftDanger += danger;
                    else rightDanger += danger;
                }
                for (let m of groundMonsters) addDanger(m.worldX + m.width/2, m.y + m.height/2, m.vx, 0, 1);
                for (let m of armoredMonsters) addDanger(m.worldX + m.width/2, m.y + m.height/2, m.vx, 0, 2);
                for (let m of flyingMonsters) addDanger(m.worldX + m.size/2, m.y + m.size/2, m.vx, m.vy, 1);
                for (let m of guardians) addDanger(m.worldX + m.size/2, m.y + m.size/2, m.vx, m.vy, 1);
                for (let m of casters) addDanger(m.worldX + m.width/2, m.y + m.height/2, 0, 0, 3);
                for (let fb of fireballs) addDanger(fb.worldX, fb.worldY, fb.vx, fb.vy, 1);
                return { left: leftDanger, right: rightDanger };
            }
            
            function findMostDangerousTarget() {
                let bestDanger = -1, bestTarget = null;
                function checkTarget(worldX, worldY, vx, vy, healthVal) {
                    const danger = calculateSingleDanger(worldX, worldY, vx, vy, healthVal);
                    if (danger > bestDanger) { bestDanger = danger; bestTarget = { worldX, worldY, vx, vy, health: healthVal }; }
                }
                for (let m of groundMonsters) checkTarget(m.worldX + m.width/2, m.y + m.height/2, m.vx, 0, 1);
                for (let m of armoredMonsters) checkTarget(m.worldX + m.width/2, m.y + m.height/2, m.vx, 0, 2);
                for (let m of flyingMonsters) checkTarget(m.worldX + m.size/2, m.y + m.size/2, m.vx, m.vy, 1);
                for (let m of guardians) checkTarget(m.worldX + m.size/2, m.y + m.size/2, m.vx, m.vy, 1);
                for (let m of casters) checkTarget(m.worldX + m.width/2, m.y + m.height/2, 0, 0, 3);
                for (let fb of fireballs) checkTarget(fb.worldX, fb.worldY, fb.vx, fb.vy, 1);
                return bestTarget;
            }
            
            let aiUpdateTimer = 0, aiDirectionTimer = 0;
            function updateAI(deltaTime) {
                if (!aiMode || !gameRunning || isPaused) return;
                if (!autoFireEnabled) { autoFireEnabled = true; if (!shootInterval) startShooting(); performSingleShot(); }
                aiDirectionTimer += deltaTime;
                if (aiDirectionTimer >= DIRECTION_CHANGE_INTERVAL) {
                    aiDirectionTimer = 0;
                    const { left, right } = evaluateLeftRightDanger();
                    if (character === 'snezhana') {
                        let threshold = 1.2;
                        if (score > 6000) threshold = 1.0;
                        const currentDanger = aiDirection === 1 ? right : left;
                        const oppositeDanger = aiDirection === 1 ? left : right;
                        if (currentDanger > oppositeDanger * threshold) {
                            aiDirection = aiDirection === 1 ? -1 : 1;
                        }
                    } else {
                        aiDirection = (left < right) ? -1 : 1;
                    }
                }
                aiUpdateTimer += deltaTime;
                if (aiUpdateTimer >= 0.01) {
                    aiUpdateTimer = 0;
                    const target = findMostDangerousTarget();
                    if (target) {
                        aiTarget = target;
                        let shoulderWorldX = player.facingRight ? player.worldX + player.width - 8 : player.worldX + 8;
                        let shoulderY = player.y + 34;
                        let dx = target.worldX - shoulderWorldX;
                        let dy = target.worldY - shoulderY;
                        targetAngle = Math.atan2(dy, dx);
                    }
                }
                let angleDiff = targetAngle - player.bazookaAngle;
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                player.bazookaAngle += angleDiff * 0.1;
            }
            
            function performSingleShot() {
                if (!gameRunning || isPaused) return;
                let shoulderWorldX, shoulderY;
                if (player.facingRight) shoulderWorldX = player.worldX + player.width - 8;
                else shoulderWorldX = player.worldX + 8;
                shoulderY = player.y + 34;
                let dx = aiMode && aiTarget ? aiTarget.worldX - shoulderWorldX : mouseWorldX - shoulderWorldX;
                let dy = aiMode && aiTarget ? aiTarget.worldY - shoulderY : mouseWorldY - shoulderY;
                let len = Math.hypot(dx, dy);
                if (len < 0.01) len = 1;
                let normX = dx / len;
                let normY = dy / len;
                bullets.push({ worldX: shoulderWorldX, worldY: shoulderY, w: BULLET_SIZE, h: BULLET_SIZE, vx: normX * BULLET_SPEED, vy: normY * BULLET_SPEED });
                let angle = Math.atan2(dy, dx);
                player.bazookaAngle = angle;
                if (dx > 0) player.facingRight = true;
                else if (dx < 0) player.facingRight = false;
                soundShoot();
                if(navigator.vibrate) navigator.vibrate(15);
            }
            
            function startShooting() {
                if (shootInterval) clearInterval(shootInterval);
                shootInterval = setInterval(() => {
                    if (gameRunning && autoFireEnabled && !isPaused) performSingleShot();

            }
            function stopShooting() { if (shootInterval) { clearInterval(shootInterval); shootInterval = null; } }

            function updateFireballs() {

                    if (fb.phase === 0) {
                        fb.vy += 0.045;
                        fb.worldX += fb.vx;
                        fb.worldY += fb.vy;
                        if (fb.vy > -0.3 || fb.worldY < GROUND_Y - 220) {
                            fb.phase = 1;
                            const dxToPlayer = fb.targetX - fb.worldX;
                            const dyToPlayer = fb.targetY - fb.worldY;
                            const dist = Math.hypot(dxToPlayer, dyToPlayer);
                            if (dist > 0.1) {
                                const baseSpeed = 0.9;
                                const dirX = dxToPlayer / dist;
                                const dirY = dyToPlayer / dist;
                                fb.vx = dirX * baseSpeed;
                                fb.vy = dirY * baseSpeed;
                            }
                        }
                    } else {
                        const targetX = player.worldX + PLAYER_WIDTH/2;
                        const targetY = player.y + PLAYER_HEIGHT/2;
                        const dxToPlayer = targetX - fb.worldX;
                        const dyToPlayer = targetY - fb.worldY;
                        const distToPlayer = Math.hypot(dxToPlayer, dyToPlayer);
                        if (distToPlayer > 0.1) {
                            const dirX = dxToPlayer / distToPlayer;
                            const dirY = dyToPlayer / distToPlayer;
                            fb.spiralAngle = (fb.spiralAngle + 0.04) % (Math.PI * 2);
                            const perpX = -dirY;
                            const perpY = dirX;
                            const spiralStrength = 0.9 * (0.6 + Math.sin(fb.spiralAngle) * 0.5);
                            let speedToPlayer = 0.9 + Math.min(0.5, score / 1200);
                            let newVx = dirX * speedToPlayer + perpX * spiralStrength;
                            let newVy = dirY * speedToPlayer + perpY * spiralStrength;
                            fb.vx = fb.vx * 0.96 + newVx * 0.04;
                            fb.vy = fb.vy * 0.96 + newVy * 0.04;
                            const maxSpeed = 2.2;
                            if (Math.abs(fb.vx) > maxSpeed) fb.vx = fb.vx > 0 ? maxSpeed : -maxSpeed;
                            if (Math.abs(fb.vy) > maxSpeed) fb.vy = fb.vy > 0 ? maxSpeed : -maxSpeed;
                        }
                        fb.worldX += fb.vx;
                        fb.worldY += fb.vy;

                    ctx.moveTo(mouseScreenX, mouseScreenY-12); ctx.lineTo(mouseScreenX, mouseScreenY+12);
                    ctx.strokeStyle = "#ffaa44"; ctx.lineWidth = 2; ctx.stroke();
                    ctx.beginPath(); ctx.arc(mouseScreenX, mouseScreenY, 8, 0, Math.PI*2); ctx.stroke();
                }
                if(!gameRunning && !isPaused) {
                    ctx.font = "bold 38monospace"; ctx.fillStyle = "#ff3366";
                    ctx.fillText("💀 GAME OVER 💀", CANVAS_WIDTH/2-150, 150);
                    ctx.font = "18px monospace"; ctx.fillStyle = "#ffdd99";
                    ctx.fillText("нажми [ЗАНОВО] чтобы продолжить", CANVAS_WIDTH/2-170, 220);
                }
                ctx.font = "bold 18monospace"; ctx.fillStyle = "#ffd966";
                ctx.fillText(`👹 П:${groundMonsters.length} 🛡️ Б:${armoredMonsters.length} 🦇 С:${flyingMonsters.length} ⚡ СТ:${guardians.length} 🧙 М:${casters.length} 🔥 Ф:${fireballs.length}`, 20, 55);
                if (autoFireEnabled && gameRunning && !isPaused) {
                    ctx.font = "bold 14monospace"; ctx.fillStyle = "#ffaa44";
                    ctx.fillText("⚡ АВТО-ОЧЕРЕДЬ ВКЛЮЧЕНА", CANVAS_WIDTH-220, 40);
                }
                if (aiMode && gameRunning && !isPaused) {
                    ctx.font = "bold 14monospace"; ctx.fillStyle = "#44ff44";
                    ctx.fillText("🤖 РЕЖИМ АВТОИГРЫ АКТИВЕН", CANVAS_WIDTH-280, 70);
                }
            }
            
            function handleKeyDown(e) {
                let code = e.code;
                if (!aiMode && (code === 'KeyA' || code === 'KeyD' || code === 'KeyW')) {
                    e.preventDefault();
                    keys[code] = true;
                    if (audioCtx?.state === 'suspended') audioCtx.resume();
                }
                if (code === 'Space') { e.preventDefault(); togglePause(); }
            }
            function handleKeyUp(e) {
                let code = e.code;
                if (!aiMode && (code === 'KeyA' || code === 'KeyD' || code === 'KeyW')) {
                    e.preventDefault();
                    keys[code] = false;
                }
            }
            function handleMouseMove(e) {
                if (aiMode) return;
                const rect = canvas.getBoundingClientRect();
                const scaleX = CANVAS_WIDTH / rect.width;
                const scaleY = CANVAS_HEIGHT / rect.height;
                let canvasX = (e.clientX - rect.left) * scaleX;
                let canvasY = (e.clientY - rect.top) * scaleY;
                canvasX = Math.min(CANVAS_WIDTH, Math.max(0, canvasX));
                canvasY = Math.min(CANVAS_HEIGHT, Math.max(0, canvasY));
                mouseScreenX = canvasX;
                mouseScreenY = canvasY;
                mouseWorldX = canvasX + cameraX - CANVAS_WIDTH/2;
                mouseWorldY = canvasY;
            }
            function handleMouseDown(e) {
                if (e.button === 0 && !aiMode) {
                    e.preventDefault();
                    if (!gameRunning || isPaused) return;
                    if (audioCtx?.state === 'suspended') audioCtx.resume();
                    toggleAutoFire();
                    if (!shootInterval && autoFireEnabled) startShooting();
                    else if (!autoFireEnabled && shootInterval) stopShooting();
                }
            }
            
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('contextmenu', (e) => e.preventDefault());
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            document.getElementById('resetBtn').addEventListener('click', () => { resetGame(); if(audioCtx) audioCtx.resume(); });
            document.getElementById('aiToggleBtn').addEventListener('click', toggleAIMode);
            const soundToggle = document.getElementById('soundToggleBtn');
            soundToggle.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                soundToggle.innerHTML = soundEnabled ? "🔊 ЗВУК ВКЛ" : "🔇 ЗВУК ВЫКЛ";
                if(soundEnabled && audioCtx?.state === 'suspended') audioCtx.resume();
            });
            document.getElementById('pauseBtn').addEventListener('click', togglePause);
            const densitySlider = document.getElementById('densitySlider');
            densitySlider.addEventListener('input', () => {
                updateDensity();
                spawnGroundTimer = Math.min(spawnGroundTimer, getCurrentGroundDelay());
                spawnArmoredTimer = Math.min(spawnArmoredTimer, getCurrentArmoredDelay());
                spawnFlyingTimer = Math.min(spawnFlyingTimer, getCurrentFlyingDelay());
                spawnGuardianTimer = Math.min(spawnGuardianTimer, getCurrentGuardianDelay());
                spawnCasterTimer = Math.min(spawnCasterTimer, getCurrentCasterDelay());
            });
            document.body.addEventListener('click', () => { if(!audioCtx) initAudio(); audioCtx?.resume(); }, { once: true });
            let lastFrameTime = 0;
            function gameLoop(time) {
                updateGame(time);
                draw();
                requestAnimationFrame(gameLoop);
            }
            resetGame();
            updateUI();
            updateDensity();
            gameLoop();
        }
    })();
</script>
</body>
</html>
