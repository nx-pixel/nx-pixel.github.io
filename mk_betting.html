<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mortal Kombat | Букмекерская контора | Ставка % от банка</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a0a1a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }
        .arena {
            max-width: 1400px;
            width: 100%;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 56px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 2px solid #d4af37;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            color: #ffcc44;
            text-shadow: 0 0 8px #ff6600;
            letter-spacing: 3px;
        }
        .sub {
            text-align: center;
            color: #aa9955;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        .bank-panel {
            background: #1a1a2a;
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #ffaa44;
        }
        .bank-info {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffdd99;
        }
        .bank-info span {
            color: #ffaa44;
            font-size: 2rem;
        }
        .odds-panel {
            background: #0a0a14;
            border-radius: 40px;
            padding: 10px 20px;
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .odds-card {
            text-align: center;
            background: #2a2a3a;
            padding: 8px 20px;
            border-radius: 40px;
        }
        .odds-card .name {
            font-weight: bold;
            color: #ffcc88;
        }
        .odds-card .value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffaa44;
        }
        .bet-panel {
            background: #1a1a2a;
            border-radius: 60px;
            padding: 15px 20px;
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .bet-mode {
            background: #0a0a14;
            padding: 8px 20px;
            border-radius: 60px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .bet-mode label {
            color: #ffcc88;
            font-weight: bold;
        }
        .bet-mode select, .bet-mode input {
            background: #2a2a3a;
            border: 1px solid #ffaa44;
            color: #ffdd99;
            padding: 6px 12px;
            border-radius: 40px;
            font-weight: bold;
        }
        .bet-mode input {
            width: 80px;
            text-align: center;
        }
        .percent-display {
            background: #2a2a3a;
            padding: 6px 12px;
            border-radius: 40px;
            color: #ffaa44;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .bet-input {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0a0a14;
            padding: 8px 20px;
            border-radius: 60px;
        }
        .bet-input label {
            font-weight: bold;
            color: #ffcc88;
        }
        .bet-input input {
            background: #2a2a3a;
            border: 1px solid #ffaa44;
            color: #ffdd99;
            padding: 8px 12px;
            border-radius: 40px;
            width: 120px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .bet-buttons {
            display: flex;
            gap: 15px;
        }
        .bet-btn {
            background: #4a3a2a;
            box-shadow: 0 3px 0 #2a1a0a;
            font-size: 1rem;
            padding: 8px 20px;
        }
        .bet-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #2a1a0a;
        }
        .bet-btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .fighters {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .fighter-card {
            flex: 1;
            background: #1a1a2aee;
            border-radius: 48px;
            padding: 20px;
            text-align: center;
            border: 2px solid #d4af37;
            transition: 0.2s;
        }
        .fighter-name {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffdd77;
            text-shadow: 2px 2px 0 #aa3300;
            margin-bottom: 15px;
        }
        .health-bar-container {
            background: #2a1a0a;
            border-radius: 30px;
            height: 24px;
            width: 100%;
            margin: 12px 0;
            overflow: hidden;
            border: 1px solid #d4af37;
        }
        .health-bar {
            background: linear-gradient(90deg, #dd3333, #ff5555);
            width: 100%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.3s ease;
        }
        .health-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffcc88;
            margin: 6px 0;
        }
        .fighter-stats {
            margin-top: 15px;
            padding: 10px;
            background: #0a0a14aa;
            border-radius: 40px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.9rem;
            color: #ffcc88;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 20px;
            flex-wrap: wrap;
        }
        button {
            background: #8b3c2a;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 28px;
            border-radius: 60px;
            color: #ffcfb0;
            cursor: pointer;
            box-shadow: 0 4px 0 #541e0e;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #541e0e;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .reset-btn {
            background: #2c3a2a;
            box-shadow: 0 4px 0 #1a2a10;
        }
        .round-btn {
            background: #aa6a2a;
            box-shadow: 0 4px 0 #6a3a1a;
            font-size: 1.3rem;
        }
        .round-display {
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffcc44;
            background: #000000aa;
            padding: 10px;
            border-radius: 60px;
            margin-top: 20px;
            border: 1px solid #d4af37;
        }
        .winner-message {
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 15px;
            color: #ffaa66;
            background: #000000aa;
            padding: 10px;
            border-radius: 40px;
        }
        .vs {
            font-size: 2rem;
            font-weight: bold;
            color: #ffaa44;
            align-self: center;
        }
        @media (max-width: 850px) {
            .fighters { flex-direction: column; }
            .vs { display: none; }
        }
    </style>
</head>
<body>
<div class="arena">
    <h1>🔥 MORTAL KOMBAT 🔥</h1>
    <div class="sub">Букмекерская контора | Ставка в % от банка</div>

    <div class="bank-panel">
        <div class="bank-info">💰 БАНК: <span id="bankAmount">1000</span> $</div>
        <div class="odds-panel" id="oddsPanel">
            <div class="odds-card"><div class="name" id="fighter1NameOdds">БОЕЦ 1</div><div class="value" id="odds1">1.85</div></div>
            <div class="odds-card"><div class="name" id="fighter2NameOdds">БОЕЦ 2</div><div class="value" id="odds2">1.85</div></div>
        </div>
    </div>

    <div class="bet-panel" id="betPanel">
        <div class="bet-mode">
            <label>📊 РЕЖИМ СТАВКИ:</label>
            <select id="betModeSelect">
                <option value="percent" selected>🎲 Процент от банка</option>
                <option value="fixed">💰 Фиксированная сумма</option>
            </select>
            <div id="percentControl" style="display: flex; gap: 10px; align-items: center;">
                <label>% от банка:</label>
                <input type="range" id="betPercent" min="1" max="25" value="3" step="1">
                <span id="percentValue" class="percent-display">3%</span>
            </div>
        </div>
        <div class="bet-input" id="fixedControl" style="display: none;">
            <label>💰 СТАВКА:</label>
            <input type="number" id="betAmount" value="30" min="1" step="10">
        </div>
        <div class="bet-buttons">
            <button id="betOnFighter1" class="bet-btn">⚔️ СТАВКА НА БОЙЦА 1</button>
            <button id="betOnFighter2" class="bet-btn">⚔️ СТАВКА НА БОЙЦА 2</button>
        </div>
        <div id="betStatus" style="color:#ffaa66; font-size:0.9rem;"></div>
    </div>

    <div class="fighters">
        <div class="fighter-card" id="fighter1Card">
            <div class="fighter-name" id="name1Display">?</div>
            <div class="health-bar-container"><div class="health-bar" id="healthBar1" style="width: 100%"></div></div>
            <div class="health-text" id="health1Display">❤️ 0 / 0</div>
            <div class="fighter-stats" id="stats1"></div>
        </div>
        <div class="vs">⚡ VS ⚡</div>
        <div class="fighter-card" id="fighter2Card">
            <div class="fighter-name" id="name2Display">?</div>
            <div class="health-bar-container"><div class="health-bar" id="healthBar2" style="width: 100%"></div></div>
            <div class="health-text" id="health2Display">❤️ 0 / 0</div>
            <div class="fighter-stats" id="stats2"></div>
        </div>
    </div>

    <div class="controls">
        <button id="resetBtn" class="reset-btn">🔄 НОВЫЙ БОЙ</button>
        <button id="nextRoundBtn" class="round-btn">💥 РАУНД 💥</button>
    </div>
    <div class="round-display" id="roundDisplay">РАУНД 0</div>
    <div id="winnerMessage" class="winner-message"></div>
</div>

<script>
    // ---------- ЗВУКИ ----------
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playHitSound() { if(audioCtx){try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';o.frequency.value=180;g.gain.setValueAtTime(0.15,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.12);o.start();o.stop(audioCtx.currentTime+0.1);}catch(e){}} }
    function playImpactSound() { if(audioCtx){try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.value=320;g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.15);o.start();o.stop(audioCtx.currentTime+0.12);}catch(e){}} }
    function playKnockdownSound() { if(audioCtx){try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sawtooth';o.frequency.value=80;g.gain.setValueAtTime(0.35,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.8);o.frequency.exponentialRampToValueAtTime(40,audioCtx.currentTime+0.6);o.start();o.stop(audioCtx.currentTime+0.8);}catch(e){}} }
    function playFightEndSound() { if(audioCtx){try{const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='sine';o.frequency.value=440;g.gain.setValueAtTime(0.25,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+1.2);o.frequency.setValueAtTime(440,audioCtx.currentTime);o.frequency.exponentialRampToValueAtTime(880,audioCtx.currentTime+0.8);o.start();o.stop(audioCtx.currentTime+1.2);}catch(e){}} }
    
    // ---------- БАЗА ДАННЫХ ПЕРСОНАЖЕЙ ----------
    const charactersList = [
        { name: "СКОРПИОН", health: 100, damage: 28, accuracy: 72, koChance: 6 },
        { name: "САБ-ЗИРО", health: 100, damage: 26, accuracy: 75, koChance: 5 },
        { name: "ЛЮ КАН", health: 95, damage: 24, accuracy: 80, koChance: 4 },
        { name: "ГОРО", health: 130, damage: 32, accuracy: 60, koChance: 8 },
        { name: "РЕЙДЕН", health: 105, damage: 27, accuracy: 70, koChance: 6 },
        { name: "КИТАНА", health: 90, damage: 22, accuracy: 85, koChance: 3 },
        { name: "ДЖОННИ КЕЙДЖ", health: 100, damage: 25, accuracy: 78, koChance: 5 },
        { name: "СОНЯ БЛЕЙД", health: 95, damage: 24, accuracy: 82, koChance: 4 },
        { name: "ШАН ЦЗУН", health: 100, damage: 28, accuracy: 68, koChance: 7 },
        { name: "МИЛИНА", health: 92, damage: 27, accuracy: 74, koChance: 6 },
        { name: "БАРАКА", health: 105, damage: 29, accuracy: 65, koChance: 7 },
        { name: "ШАО КАН", health: 140, damage: 34, accuracy: 58, koChance: 10 },
        { name: "ДЖЕЙД", health: 93, damage: 23, accuracy: 84, koChance: 4 },
        { name: "НУБ САЙБОТ", health: 100, damage: 27, accuracy: 73, koChance: 7 },
        { name: "СИНДЕЛ", health: 95, damage: 26, accuracy: 78, koChance: 6 },
        { name: "КУНГ ЛАО", health: 98, damage: 25, accuracy: 79, koChance: 5 },
        { name: "КАБАЛ", health: 95, damage: 24, accuracy: 84, koChance: 4 },
        { name: "НОЧНОЙ ВОЛК", health: 108, damage: 26, accuracy: 76, koChance: 5 },
        { name: "ЭРРОН БЛЭК", health: 97, damage: 25, accuracy: 80, koChance: 5 },
        { name: "ФРОСТ", health: 92, damage: 24, accuracy: 83, koChance: 4 },
        { name: "ЦЗЮНЬ", health: 100, damage: 26, accuracy: 77, koChance: 5 }
    ];
    
    // Класс бойца
    class Fighter {
        constructor(char) {
            this.name = char.name;
            this.maxHealth = char.health;
            this.health = char.health;
            this.baseDamage = char.damage;
            this.accuracy = char.accuracy / 100;
            this.baseKoChance = char.koChance / 100;
        }
        getCurrentDamage() {
            const healthPercent = this.health / this.maxHealth;
            const multiplier = 0.5 + (healthPercent * 0.5);
            return Math.max(1, Math.floor(this.baseDamage * multiplier));
        }
    }
    
    // Переменные боя
    let fighter1, fighter2;
    let gameActive = true;
    let roundCount = 0;
    let bank = 1000;
    let currentBet = null;
    let betInProgress = false;
    
    // DOM элементы
    const name1Display = document.getElementById('name1Display');
    const name2Display = document.getElementById('name2Display');
    const health1Display = document.getElementById('health1Display');
    const health2Display = document.getElementById('health2Display');
    const healthBar1 = document.getElementById('healthBar1');
    const healthBar2 = document.getElementById('healthBar2');
    const stats1Div = document.getElementById('stats1');
    const stats2Div = document.getElementById('stats2');
    const roundDisplay = document.getElementById('roundDisplay');
    const winnerMessageDiv = document.getElementById('winnerMessage');
    const nextRoundBtn = document.getElementById('nextRoundBtn');
    const resetBtn = document.getElementById('resetBtn');
    const bankAmountSpan = document.getElementById('bankAmount');
    const odds1Span = document.getElementById('odds1');
    const odds2Span = document.getElementById('odds2');
    const fighter1NameOdds = document.getElementById('fighter1NameOdds');
    const fighter2NameOdds = document.getElementById('fighter2NameOdds');
    const betAmountInput = document.getElementById('betAmount');
    const betStatus = document.getElementById('betStatus');
    const betOnFighter1Btn = document.getElementById('betOnFighter1');
    const betOnFighter2Btn = document.getElementById('betOnFighter2');
    const betModeSelect = document.getElementById('betModeSelect');
    const betPercent = document.getElementById('betPercent');
    const percentValue = document.getElementById('percentValue');
    const percentControl = document.getElementById('percentControl');
    const fixedControl = document.getElementById('fixedControl');
    
    function updateBetControls() {
        if (betModeSelect.value === 'percent') {
            percentControl.style.display = 'flex';
            fixedControl.style.display = 'none';
        } else {
            percentControl.style.display = 'none';
            fixedControl.style.display = 'flex';
        }
        updateBetAmountDisplay();
    }
    
    function updateBetAmountDisplay() {
        if (betModeSelect.value === 'percent') {
            const percent = parseInt(betPercent.value);
            const amount = Math.floor(bank * percent / 100);
            percentValue.textContent = percent + '%';
            betAmountInput.value = Math.max(1, amount);
        }
    }
    
    function getCurrentBetAmount() {
        let amount;
        if (betModeSelect.value === 'percent') {
            const percent = parseInt(betPercent.value);
            amount = Math.floor(bank * percent / 100);
        } else {
            amount = parseInt(betAmountInput.value);
        }
        if (isNaN(amount) || amount <= 0) amount = 1;
        return amount;
    }
    
    function getCurrentPercent() {
        if (betModeSelect.value === 'percent') {
            return parseInt(betPercent.value);
        }
        return null;
    }
    
    betModeSelect.addEventListener('change', updateBetControls);
    betPercent.addEventListener('input', () => {
        percentValue.textContent = betPercent.value + '%';
        updateBetAmountDisplay();
    });
    
    function getRandomFighter(excludeName = null) {
        let available = [...charactersList];
        if (excludeName) available = available.filter(c => c.name !== excludeName);
        if (available.length === 0) available = [...charactersList];
        const idx = Math.floor(Math.random() * available.length);
        return available[idx];
    }
    
    function initRandomFighters() {
        const char1 = getRandomFighter();
        const char2 = getRandomFighter(char1.name);
        fighter1 = new Fighter(char1);
        fighter2 = new Fighter(char2);
    }
    
    function updateStatsDisplay() {
        stats1Div.innerHTML = `
            <div class="stat-row">⚔️ Базовый урон: ${fighter1.baseDamage}</div>
            <div class="stat-row">🎯 Точность: ${Math.floor(fighter1.accuracy * 100)}%</div>
            <div class="stat-row">💀 Шанс нокаута: ${Math.floor(fighter1.baseKoChance * 100)}%</div>
        `;
        stats2Div.innerHTML = `
            <div class="stat-row">⚔️ Базовый урон: ${fighter2.baseDamage}</div>
            <div class="stat-row">🎯 Точность: ${Math.floor(fighter2.accuracy * 100)}%</div>
            <div class="stat-row">💀 Шанс нокаута: ${Math.floor(fighter2.baseKoChance * 100)}%</div>
        `;
    }
    
    function updateUI() {
        name1Display.textContent = fighter1.name;
        name2Display.textContent = fighter2.name;
        fighter1NameOdds.textContent = fighter1.name;
        fighter2NameOdds.textContent = fighter2.name;
        health1Display.innerHTML = `❤️ ${Math.max(0, Math.floor(fighter1.health))} / ${fighter1.maxHealth}`;
        health2Display.innerHTML = `❤️ ${Math.max(0, Math.floor(fighter2.health))} / ${fighter2.maxHealth}`;
        healthBar1.style.width = Math.max(0, (fighter1.health / fighter1.maxHealth) * 100) + '%';
        healthBar2.style.width = Math.max(0, (fighter2.health / fighter2.maxHealth) * 100) + '%';
        updateStatsDisplay();
        nextRoundBtn.disabled = !gameActive || fighter1.health <= 0 || fighter2.health <= 0;
        roundDisplay.innerHTML = gameActive ? `РАУНД ${roundCount}` : `БОЙ ЗАВЕРШЁН`;
        bankAmountSpan.textContent = Math.floor(bank);
        updateOdds();
        
        updateBetAmountDisplay();
        
        const betButtonsDisabled = !gameActive || betInProgress || fighter1.health <= 0 || fighter2.health <= 0;
        betOnFighter1Btn.disabled = betButtonsDisabled;
        betOnFighter2Btn.disabled = betButtonsDisabled;
        resetBtn.disabled = betInProgress;
    }
    
    function calcPower(f) {
        const currentDamage = f.getCurrentDamage();
        return f.health * currentDamage * f.accuracy * (f.baseKoChance + 0.05);
    }
    
    function updateOdds() {
        let p1 = calcPower(fighter1);
        let p2 = calcPower(fighter2);
        let total = p1 + p2;
        if (total === 0) {
            odds1Span.textContent = "1.85";
            odds2Span.textContent = "1.85";
            return;
        }
        let raw1 = total / p1;
        let raw2 = total / p2;
        let margin = 0.05;
        let odds1 = raw1 * (1 - margin);
        let odds2 = raw2 * (1 - margin);
        odds1Span.textContent = odds1.toFixed(2);
        odds2Span.textContent = odds2.toFixed(2);
    }
    
    function checkKoByChance(attacker, defender, attackerBaseChance) {
        if (defender.health <= 0) return false;
        let ratio = attacker.health / Math.max(1, defender.health);
        let chance = ratio * attackerBaseChance;
        chance = Math.min(0.95, Math.max(0, chance));
        return Math.random() < chance;
    }
    
    function payoutBet(winnerFighter, isDraw = false) {
        if (!currentBet) return;
        if (isDraw) {
            bank += currentBet.amount;
            betStatus.innerHTML = `🔄 НИЧЬЯ! Ставка ${currentBet.amount}$ возвращена.`;
        } else if (currentBet.fighter === winnerFighter) {
            let odds = (currentBet.fighter === 1 ? parseFloat(odds1Span.textContent) : parseFloat(odds2Span.textContent));
            let win = Math.floor(currentBet.amount * odds);
            bank += win;
            betStatus.innerHTML = `✅ ВЫИГРЫШ! +${win}$ (коэф. ${odds.toFixed(2)})`;
        } else {
            betStatus.innerHTML = `❌ ПРОИГРЫШ! Ставка ${currentBet.amount}$ сгорела.`;
        }
        currentBet = null;
        betInProgress = false;
        updateUI();
        setTimeout(() => { if (betStatus.innerHTML) betStatus.innerHTML = ''; }, 3000);
    }
    
    function placeBet(fighter) {
        if (!gameActive) { betStatus.innerHTML = "❌ Бой уже окончен!"; return; }
        if (fighter1.health <= 0 || fighter2.health <= 0) { betStatus.innerHTML = "❌ Бой окончен!"; return; }
        if (betInProgress) { betStatus.innerHTML = "❌ Ставка уже сделана в этом раунде!"; return; }
        let amount = getCurrentBetAmount();
        if (amount <= 0) { betStatus.innerHTML = "❌ Сумма ставки должна быть больше 0!"; return; }
        if (amount > bank) { betStatus.innerHTML = `❌ Недостаточно средств! Банк: ${Math.floor(bank)}$`; return; }
        bank -= amount;
        currentBet = { amount: amount, fighter: fighter };
        betInProgress = true;
        updateUI();
        const percent = getCurrentPercent();
        if (percent !== null) {
            betStatus.innerHTML = `⭐ Ставка ${amount}$ (${percent}% от банка) на ${fighter === 1 ? fighter1.name : fighter2.name} принята!`;
        } else {
            betStatus.innerHTML = `⭐ Ставка ${amount}$ на ${fighter === 1 ? fighter1.name : fighter2.name} принята!`;
        }
        setTimeout(() => {
            if (betStatus.innerHTML.includes("принята")) betStatus.innerHTML = '';
        }, 2000);
    }
    
    function executeRound() {
        if (!gameActive) return;
        if (fighter1.health <= 0 || fighter2.health <= 0) return;
        
        roundCount++;
        updateUI();
        playHitSound();
        
        let damage1 = fighter1.getCurrentDamage();
        let damage2 = fighter2.getCurrentDamage();
        
        let hit1 = Math.random() <= fighter1.accuracy;
        let hit2 = Math.random() <= fighter2.accuracy;
        
        if (hit1) { fighter2.health = Math.max(0, fighter2.health - damage1); }
        if (hit2) { fighter1.health = Math.max(0, fighter1.health - damage2); }
        if (hit1 || hit2) playImpactSound();
        
        let ko1 = checkKoByChance(fighter1, fighter2, fighter1.baseKoChance);
        let ko2 = checkKoByChance(fighter2, fighter1, fighter2.baseKoChance);
        let isDraw = false;
        
        if (fighter1.health <= 0 && fighter2.health <= 0) {
            isDraw = true;
            gameActive = false;
            payoutBet(null, true);
            playKnockdownSound();
            playFightEndSound();
        } else if (fighter1.health <= 0) {
            gameActive = false;
            payoutBet(2);
            playKnockdownSound();
            playFightEndSound();
        } else if (fighter2.health <= 0) {
            gameActive = false;
            payoutBet(1);
            playKnockdownSound();
            playFightEndSound();
        } else if (ko1) {
            fighter2.health = 0;
            gameActive = false;
            payoutBet(1);
            playKnockdownSound();
            playFightEndSound();
        } else if (ko2) {
            fighter1.health = 0;
            gameActive = false;
            payoutBet(2);
            playKnockdownSound();
            playFightEndSound();
        }
        
        updateUI();
        if (!gameActive) {
            if (isDraw) winnerMessageDiv.innerHTML = "💀 ДВОЙНОЙ НОКАУТ! НИЧЬЯ! 💀";
            else if (fighter1.health <= 0) winnerMessageDiv.innerHTML = `💀 НОКАУТ! ПОБЕДИТЕЛЬ — ${fighter2.name} в ${roundCount} РАУНДЕ! 💀`;
            else if (fighter2.health <= 0) winnerMessageDiv.innerHTML = `💀 НОКАУТ! ПОБЕДИТЕЛЬ — ${fighter1.name} в ${roundCount} РАУНДЕ! 💀`;
            nextRoundBtn.disabled = true;
        }
    }
    
    function resetBattle() {
        if (betInProgress) {
            betStatus.innerHTML = "❌ Сначала дождитесь окончания текущего боя!";
            return;
        }
        initRandomFighters();
        gameActive = true;
        roundCount = 0;
        currentBet = null;
        betInProgress = false;
        betStatus.innerHTML = "";
        winnerMessageDiv.innerHTML = "";
        updateUI();
        nextRoundBtn.disabled = false;
        playHitSound();
    }
    
    document.getElementById('resetBtn').addEventListener('click', resetBattle);
    document.getElementById('nextRoundBtn').addEventListener('click', () => {
        if (gameActive && fighter1.health > 0 && fighter2.health > 0) executeRound();
    });
    document.getElementById('betOnFighter1').addEventListener('click', () => placeBet(1));
    document.getElementById('betOnFighter2').addEventListener('click', () => placeBet(2));
    
    document.body.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        else if (!audioCtx) initAudio();
    }, { once: true });
    
    // Инициализация
    initRandomFighters();
    updateBetControls();
    resetBattle();
</script>
</body>
</html>
