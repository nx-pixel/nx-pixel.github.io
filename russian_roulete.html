<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Русская рулетка | Выбор режима + Случайный первый (исправлено)</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #1a2a1f 0%, #0a1308 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', 'Monaco', monospace;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(30, 20, 15, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 68px;
            padding: 20px 20px 35px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
            border: 1px solid #b87c3a;
        }

        .setup-panel {
            background: #1f1a14cc;
            border-radius: 50px;
            padding: 15px 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid #ca9622;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .name-input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: #2c2418aa;
            padding: 8px 15px;
            border-radius: 40px;
        }

        .name-input-group label {
            font-size: 0.8rem;
            color: #ffdd99;
            letter-spacing: 1px;
        }

        .name-input-group input {
            background: #3b2e22;
            border: 1px solid #aa7c48;
            color: #ffdd99;
            padding: 8px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .name-input-group input:focus {
            border-color: #ffb347;
            box-shadow: 0 0 8px #ffaa33;
        }

        .mode-select {
            background: #2c2418aa;
            padding: 8px 20px;
            border-radius: 40px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .mode-select label {
            color: #ffdd99;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mode-select input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .randomize-btn, .apply-btn {
            padding: 8px 20px;
            font-size: 1rem;
            box-shadow: 0 3px 0 #2a1e12;
        }

        .apply-btn {
            background: #5a7a3a;
            box-shadow: 0 3px 0 #2a3a1a;
        }

        .arena {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .character {
            flex: 1;
            background: #2c2418aa;
            border-radius: 48px;
            padding: 20px 10px;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid #6a4c2c;
            position: relative;
            backdrop-filter: blur(4px);
        }

        .character.active-turn {
            border: 4px solid #ffb347;
            background: #4f361fe6;
            box-shadow: 0 0 20px #ffaa33;
            transform: scale(1.01);
        }

        .character.dead {
            opacity: 0.9;
            background: #2a1f12;
            border-color: #5a3a1a;
            filter: grayscale(0.3);
        }

        .canvas-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        canvas {
            background: #2a3a2a;
            border-radius: 60px;
            box-shadow: inset 0 0 0 3px #2e241b, 0 8px 18px black;
            width: 100%;
            max-width: 280px;
            height: auto;
            background: radial-gradient(circle at 30% 20%, #4a6a3a, #2a3a1a);
        }

        .character-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffdd99;
            text-shadow: 2px 2px 0 #5a2a0a;
            margin: 10px 0 5px;
            word-break: break-word;
        }

        .health-status {
            font-size: 1rem;
            font-weight: bold;
            background: #00000099;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
        }

        .alive-text { color: #aaffaa; }
        .dead-text { color: #ff8888; text-decoration: line-through; }

        .revolver {
            background: #2c2418;
            border-radius: 80px;
            padding: 15px;
            margin: 10px 0 20px;
            box-shadow: inset 0 0 0 4px #4a3724, 0 8px 18px black;
        }

        .cylinder {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            background: #3b2e22;
            padding: 15px;
            border-radius: 60px;
        }

        .chamber {
            width: 55px;
            height: 55px;
            background: radial-gradient(circle at 35% 35%, #5c4a34, #2e241b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: inset 0 -2px 0 #1f170f, 0 4px 10px black;
            border: 1px solid #aa7c48;
            color: #ecd9b4;
            transition: 0.05s linear;
        }

        .chamber.active-bullet {
            background: radial-gradient(circle at 35% 35%, #cc3a3a, #6a1010);
            box-shadow: 0 0 14px red;
            color: white;
        }

        .chance-panel {
            background: #1f1a14cc;
            border-radius: 60px;
            padding: 10px 20px;
            margin: 10px auto;
            text-align: center;
            max-width: 450px;
            font-size: 1.3rem;
            font-weight: bold;
            font-family: monospace;
            backdrop-filter: blur(8px);
            border: 1px solid #ca9622;
        }
        .chance-value {
            color: #ffaa66;
            font-size: 1.8rem;
            background: #00000077;
            display: inline-block;
            padding: 4px 18px;
            border-radius: 40px;
            letter-spacing: 2px;
        }

        .actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 20px 0 15px;
            flex-wrap: wrap;
        }

        button {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.3rem;
            padding: 12px 32px;
            border-radius: 60px;
            border: none;
            background: #1f1a14;
            color: #f0cf9f;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 5px 0 #3f2a18;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #3f2a18; }
        .shoot-btn { background: #8b3c2a; color: #ffcfb0; box-shadow: 0 5px 0 #541e0e; font-size: 1.5rem; }
        .shoot-btn:disabled { opacity: 0.5; transform: none; cursor: not-allowed; }
        .reset-btn { background: #2c3823; }

        .message-area {
            background: #000000aa;
            border-radius: 50px;
            padding: 12px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f7eac5;
            border-left: 8px solid #c97e2a;
            backdrop-filter: blur(4px);
            margin-top: 15px;
        }

        @media (max-width: 750px) {
            .arena { flex-direction: column; }
            .chamber { width: 45px; height: 45px; font-size: 20px; }
            .character-name { font-size: 1.2rem; }
            button { padding: 8px 20px; font-size: 1rem; }
            .chance-panel { font-size: 1rem; }
            .setup-panel { flex-direction: column; }
            .mode-select { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="setup-panel" id="setupPanel">
        <div class="name-input-group">
            <label>👤 Игрок 1</label>
            <input type="text" id="player1Name" maxlength="20" placeholder="Игрок 1" value="Ковбой Джо">
        </div>
        <div class="name-input-group">
            <label>👤 Игрок 2</label>
            <input type="text" id="player2Name" maxlength="20" placeholder="Игрок 2" value="Счастливчик Люк">
        </div>
        <div class="mode-select">
            <label>
                <input type="radio" name="mode" value="noSpin" checked> 🔄 Без вращения (шанс 1/6→1/5→...)
            </label>
            <label>
                <input type="radio" name="mode" value="spin"> 🌀 С вращением (всегда 1/6)
            </label>
        </div>
        <button id="randomizeFirstBtn" class="randomize-btn">🎲 Случайный первый</button>
        <button id="applyNamesBtn" class="apply-btn">✅ Применить</button>
    </div>

    <div class="arena" id="arena">
        <div class="character" id="char1">
            <div class="canvas-container"><canvas id="canvas1" width="280" height="280"></canvas></div>
            <div class="character-name" id="name1">Игрок 1</div>
            <div class="health-status" id="status1">❤️ ЖИВ</div>
        </div>
        <div class="character" id="char2">
            <div class="canvas-container"><canvas id="canvas2" width="280" height="280"></canvas></div>
            <div class="character-name" id="name2">Игрок 2</div>
            <div class="health-status" id="status2">❤️ ЖИВ</div>
        </div>
    </div>

    <div class="revolver">
        <div class="cylinder" id="cylinderView"></div>
    </div>

    <div class="chance-panel" id="chancePanel">
        🎲 ВЕРОЯТНОСТЬ СМЕРТИ: <span class="chance-value" id="chancePercent">---</span>
    </div>

    <div class="actions">
        <button id="shootBtn" class="shoot-btn">💥 ВЫСТРЕЛ В СЕБЯ</button>
        <button id="resetBtn" class="reset-btn">🔄 НОВАЯ ИГРА</button>
    </div>
    <div class="message-area" id="gameMessage">🎲 Нажмите выстрел</div>
</div>

<script>
    (function(){
        // ---------- ИГРОВЫЕ ПЕРЕМЕННЫЕ ----------
        let players = [
            { id:0, name:"Ковбой Джо", alive: true, canvasId:"canvas1", charDiv:"char1", statusSpan:"status1", nameSpan:"name1" },
            { id:1, name:"Счастливчик Люк", alive: true, canvasId:"canvas2", charDiv:"char2", statusSpan:"status2", nameSpan:"name2" }
        ];
        let currentPlayerIdx = 0;
        let gameActive = true;
        let waitingForAction = false;
        
        // Режим игры: true = с вращением (всегда 1/6), false = без вращения (классика)
        let spinMode = false;
        
        // Для режима БЕЗ вращения: заранее определён номер смертельного выстрела
        let fatalShotNumber = -1;
        let currentShotNumber = 1;
        
        // Для режима С вращением: патрон в случайном слоте при каждом выстреле (имитация)
        let bulletInChamber = -1;
        
        let pendingNames = null;
        
        // ---------- АУДИО ----------
        let audioCtx = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        function playLiveShot() {
            if (!audioCtx) { initAudio(); }
            const resumePlay = () => {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth';
                osc.frequency.value = 120;
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.7);
                osc.start();
                osc.stop(now + 1.0);
                const bufferSize = 4096;
                const noiseNode = audioCtx.createScriptProcessor(bufferSize, 1, 1);
                noiseNode.onaudioprocess = function(e) {
                    const output = e.outputBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) output[i] = (Math.random() * 2 - 1) * 0.35;
                };
                const noiseGain = audioCtx.createGain();
                noiseNode.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                noiseGain.gain.setValueAtTime(0.45, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
                setTimeout(() => { try { noiseNode.disconnect(); } catch(e) {} }, 600);
            };
            if (audioCtx.state === 'suspended') audioCtx.resume().then(resumePlay);
            else resumePlay();
        }
        
        function playBlankShot() {
            if (!audioCtx) { initAudio(); }
            const resumePlay = () => {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'triangle';
                osc.frequency.value = 800;
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.25);
                osc.start();
                osc.stop(now + 0.22);
                const clickGain = audioCtx.createGain();
                const clickOsc = audioCtx.createOscillator();
                clickOsc.connect(clickGain);
                clickGain.connect(audioCtx.destination);
                clickOsc.type = 'sine';
                clickOsc.frequency.value = 1200;
                clickGain.gain.setValueAtTime(0.12, now);
                clickGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
                clickOsc.start();
                clickOsc.stop(now + 0.07);
            };
            if (audioCtx.state === 'suspended') audioCtx.resume().then(resumePlay);
            else resumePlay();
        }
        
        // ---------- РИСОВАНИЕ (пистолет правее) ----------
        function drawStickman(ctx, width, height, isActiveTurn, isDead, isShooting = false) {
            ctx.clearRect(0, 0, width, height);
            const centerX = width/2;
            const groundY = height - 45;
            
            if (isDead) {
                ctx.fillStyle = "#5a4a3a";
                ctx.fillRect(0, height-30, width, 30);
                ctx.fillStyle = "#c4a882";
                ctx.beginPath();
                ctx.ellipse(centerX, groundY-12, 22, 16, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#4a3020";
                ctx.beginPath();
                ctx.ellipse(centerX-8, groundY-18, 3, 4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(centerX+8, groundY-18, 3, 4, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(centerX-11, groundY-20); ctx.lineTo(centerX-5, groundY-15);
                ctx.moveTo(centerX-5, groundY-20); ctx.lineTo(centerX-11, groundY-15);
                ctx.moveTo(centerX+5, groundY-20); ctx.lineTo(centerX+11, groundY-15);
                ctx.moveTo(centerX+11, groundY-20); ctx.lineTo(centerX+5, groundY-15);
                ctx.strokeStyle = "#aa0000";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = "#8b0000aa";
                ctx.beginPath();
                ctx.ellipse(centerX, groundY-5, 28, 12, 0, 0, Math.PI*2);
                ctx.fill();
                return;
            }
            
            ctx.beginPath();
            ctx.arc(centerX, groundY-38, 16, 0, Math.PI*2);
            ctx.fillStyle = "#f5deb3";
            ctx.fill();
            ctx.strokeStyle = "#8b6914";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.fillStyle = "#2c1810";
            ctx.beginPath();
            ctx.ellipse(centerX-5, groundY-43, 2.5, 3.5, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(centerX+5, groundY-43, 2.5, 3.5, 0, 0, Math.PI*2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#8b4513";
            if (isActiveTurn || isShooting) {
                ctx.beginPath();
                ctx.ellipse(centerX, groundY-35, 6, 4, 0, 0, Math.PI*2);
                ctx.fillStyle = "#8b3a2a";
                ctx.fill();
                ctx.fillStyle = "#fff8dc";
                ctx.beginPath();
                ctx.rect(centerX-4, groundY-37, 2.5, 3);
                ctx.fill();
                ctx.beginPath();
                ctx.rect(centerX+1.5, groundY-37, 2.5, 3);
                ctx.fill();
                ctx.fillStyle = "#aa5533";
                ctx.beginPath();
                ctx.ellipse(centerX, groundY-34, 3, 2, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(centerX-9, groundY-47);
                ctx.lineTo(centerX-3, groundY-45);
                ctx.moveTo(centerX+9, groundY-47);
                ctx.lineTo(centerX+3, groundY-45);
                ctx.lineWidth = 2;
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(centerX, groundY-34, 6, 0.1, Math.PI - 0.1);
                ctx.stroke();
            }
            
            ctx.beginPath();
            ctx.moveTo(centerX, groundY-22);
            ctx.lineTo(centerX, groundY);
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#f5deb3";
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, groundY);
            ctx.lineTo(centerX-12, groundY+12);
            ctx.moveTo(centerX, groundY);
            ctx.lineTo(centerX+12, groundY+12);
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#c4a882";
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(centerX, groundY-15);
            ctx.lineTo(centerX-15, groundY-5);
            ctx.lineWidth = 3;
            ctx.stroke();
            
            if (isActiveTurn || isShooting) {
                const handX = centerX + 28;
                const handY = groundY - 44;
                ctx.beginPath();
                ctx.moveTo(centerX, groundY-15);
                ctx.lineTo(handX, handY);
                ctx.stroke();
                
                const muzzleX = handX - 12;
                const muzzleY = handY + 2;
                ctx.beginPath();
                ctx.moveTo(muzzleX, muzzleY);
                ctx.lineTo(handX - 2, handY + 1);
                ctx.lineWidth = 4;
                ctx.strokeStyle = "#3a3a3a";
                ctx.stroke();
                
                ctx.fillStyle = "#4a4a4a";
                ctx.beginPath();
                ctx.rect(handX - 6, handY - 5, 14, 7);
                ctx.fill();
                
                ctx.fillStyle = "#6a4a2a";
                ctx.beginPath();
                ctx.moveTo(handX + 4, handY - 4);
                ctx.lineTo(handX + 14, handY + 2);
                ctx.lineTo(handX + 10, handY + 3);
                ctx.fill();
                
                ctx.fillStyle = "#8a6a3a";
                ctx.beginPath();
                ctx.arc(handX, handY - 1, 2, 0, Math.PI*2);
                ctx.fill();
                
                ctx.fillStyle = "#111";
                ctx.beginPath();
                ctx.arc(muzzleX, muzzleY, 2, 0, Math.PI*2);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.moveTo(centerX, groundY-15);
                ctx.lineTo(centerX+15, groundY-10);
                ctx.stroke();
            }
        }
        
        function renderAllCharacters(shootingPlayerId = null) {
            for(let p of players) {
                const canvas = document.getElementById(p.canvasId);
                if(!canvas) continue;
                const ctx = canvas.getContext('2d');
                const isActive = (gameActive && p.alive && currentPlayerIdx === p.id && !waitingForAction);
                const isDead = !p.alive;
                const isShooting = (shootingPlayerId === p.id);
                drawStickman(ctx, canvas.width, canvas.height, isActive, isDead, isShooting);
            }
        }
        
        function updateUIPlayers() {
            for(let p of players) {
                const charDiv = document.getElementById(p.charDiv);
                const statusSpan = document.getElementById(p.statusSpan);
                const nameSpan = document.getElementById(p.nameSpan);
                nameSpan.textContent = p.name;
                if(!p.alive) {
                    charDiv.classList.add('dead');
                    statusSpan.innerHTML = "💀 МЁРТВ";
                    statusSpan.className = "health-status dead-text";
                } else {
                    charDiv.classList.remove('dead');
                    statusSpan.innerHTML = "❤️ ЖИВ";
                    statusSpan.className = "health-status alive-text";
                }
                if(gameActive && p.alive && currentPlayerIdx === p.id) {
                    charDiv.classList.add('active-turn');
                } else {
                    charDiv.classList.remove('active-turn');
                }
            }
            renderAllCharacters();
        }
        
        function renderCylinder() {
            const cylinderDiv = document.getElementById('cylinderView');
            cylinderDiv.innerHTML = '';
            for(let i=0;i<6;i++) {
                const chamberDiv = document.createElement('div');
                chamberDiv.classList.add('chamber');
                let showBullet = false;
                if(!gameActive && spinMode) {
                    showBullet = (i === bulletInChamber);
                }
                if(showBullet) {
                    chamberDiv.classList.add('active-bullet');
                    chamberDiv.textContent = '💥';
                } else {
                    chamberDiv.textContent = '●';
                }
                cylinderDiv.appendChild(chamberDiv);
            }
        }
        
        function getCurrentChance() {
            if (!gameActive) return { percent: 0, denominator: 0, text: "---" };
            if (spinMode) {
                return { percent: Math.floor((1/6)*100), denominator: 6, text: "1/6" };
            } else {
                let remaining = 7 - currentShotNumber;
                if (remaining < 1) remaining = 1;
                let percent = Math.floor((1 / remaining) * 100);
                return { percent: percent, denominator: remaining, text: `1/${remaining}` };
            }
        }
        
        function updateChanceDisplay() {
            const chanceSpan = document.getElementById('chancePercent');
            if (!gameActive) {
                chanceSpan.innerHTML = "---";
                return;
            }
            const { percent, denominator } = getCurrentChance();
            chanceSpan.innerHTML = `${percent}% (1/${denominator})`;
            if (denominator === 1) chanceSpan.style.color = "#ff7777";
            else chanceSpan.style.color = "#ffaa66";
        }
        
        function showMessage(msg) {
            const msgDiv = document.getElementById('gameMessage');
            msgDiv.innerHTML = msg;
        }
        
        function switchToNextAlive() {
            if(!gameActive) return false;
            let next = (currentPlayerIdx + 1) % players.length;
            let attempts = 0;
            while(!players[next].alive && attempts < players.length) {
                next = (next+1) % players.length;
                attempts++;
            }
            if(!players[next].alive) {
                gameActive = false;
                updateUIPlayers();
                renderCylinder();
                showMessage("💀 ОБА МЕРТВЫ. Игра окончена.");
                return false;
            }
            currentPlayerIdx = next;
            updateUIPlayers();
            updateChanceDisplay();
            return true;
        }
        
        // --- ЛОГИКА ВЫСТРЕЛА с учётом режима ---
        async function performShot() {
            if(!gameActive) {
                showMessage("Игра окончена. Новая игра.");
                return;
            }
            if(waitingForAction) {
                showMessage("🌀 Анимация, подождите...");
                return;
            }
            const currentPlayer = players[currentPlayerIdx];
            if(!currentPlayer.alive) {
                switchToNextAlive();
                if(!gameActive) return;
                showMessage(`Ход передан, ${players[currentPlayerIdx].name} стреляет.`);
                updateUIPlayers();
                return;
            }
            
            waitingForAction = true;
            const shootBtn = document.getElementById('shootBtn');
            shootBtn.disabled = true;
            
            renderAllCharacters(currentPlayer.id);
            await new Promise(r => setTimeout(r, 120));
            
            let isDeadly = false;
            let chanceInfo = getCurrentChance();
            
            if (spinMode) {
                // Режим с вращением: патрон в случайной каморе при каждом выстреле (1/6)
                bulletInChamber = Math.floor(Math.random() * 6);
                isDeadly = (bulletInChamber === 0);
            } else {
                // Режим без вращения
                isDeadly = (currentShotNumber === fatalShotNumber);
            }
            
            if (isDeadly) {
                playLiveShot();
                showMessage(`💀🔫 БАХ! ${currentPlayer.name} застрелился! Шанс был ${chanceInfo.percent}% (${chanceInfo.text})`);
                players[currentPlayerIdx].alive = false;
                gameActive = false;
                renderCylinder();
                updateUIPlayers();
                renderAllCharacters();
                shootBtn.disabled = true;
                waitingForAction = false;
                updateChanceDisplay();
                return;
            } else {
                playBlankShot();
                let nextChanceText = "";
                if (spinMode) {
                    nextChanceText = " (шанс остаётся 1/6)";
                } else {
                    currentShotNumber++;
                    let remaining = 7 - currentShotNumber;
                    nextChanceText = ` → следующий шанс 1/${remaining}`;
                }
                showMessage(`🔧 ЩЕЛЧОК! ${currentPlayer.name} выжил! Шанс был ${chanceInfo.percent}% (${chanceInfo.text})${nextChanceText}`);
                
                if (!spinMode && currentShotNumber > 6) {
                    gameActive = false;
                    showMessage("😮 Невероятно! Все 6 выстрелов были холостыми? Игра окончена.");
                    updateUIPlayers();
                    waitingForAction = false;
                    shootBtn.disabled = true;
                    return;
                }
                
                const success = switchToNextAlive();
                if(!success || !gameActive) {
                    waitingForAction = false;
                    shootBtn.disabled = !gameActive;
                    updateUIPlayers();
                    renderCylinder();
                    updateChanceDisplay();
                    return;
                }
                updateUIPlayers();
                renderCylinder();
                updateChanceDisplay();
                waitingForAction = false;
                shootBtn.disabled = false;
                if(!gameActive) shootBtn.disabled = true;
                renderAllCharacters();
            }
        }
        
        function newGame(randomizeFirstPlayer = true) {
            if(waitingForAction) return;
            
            if (pendingNames) {
                players[0].name = pendingNames.player1;
                players[1].name = pendingNames.player2;
                pendingNames = null;
            }
            
            gameActive = true;
            waitingForAction = false;
            players.forEach(p => p.alive = true);
            
            // Читаем выбранный режим
            const spinRadio = document.querySelector('input[value="spin"]');
            spinMode = spinRadio ? spinRadio.checked : false;
            
            if (spinMode) {
                // Режим с вращением
                bulletInChamber = Math.floor(Math.random() * 6);
            } else {
                // Режим без вращения: случайный смертельный выстрел (1-6)
                fatalShotNumber = Math.floor(Math.random() * 6) + 1;
                currentShotNumber = 1;
            }
            
            if (randomizeFirstPlayer) {
                currentPlayerIdx = Math.random() < 0.5 ? 0 : 1;
            }
            
            updateUIPlayers();
            renderCylinder();
            updateChanceDisplay();
            const shootBtnElem = document.getElementById('shootBtn');
            shootBtnElem.disabled = false;
            
            const chance = getCurrentChance();
            const modeText = spinMode ? "С ВРАЩЕНИЕМ (всегда 1/6)" : "БЕЗ ВРАЩЕНИЯ (шанс растёт)";
            showMessage(`🔄 НОВАЯ ИГРА! Режим: ${modeText}. Первым стреляет ${players[currentPlayerIdx].name}. Шанс: ${chance.percent}% (${chance.text})`);
            setTimeout(()=>{ renderAllCharacters(); }, 30);
        }
        
        function applyNames() {
            const name1Input = document.getElementById('player1Name').value.trim();
            const name2Input = document.getElementById('player2Name').value.trim();
            
            if (name1Input) players[0].name = name1Input;
            if (name2Input) players[1].name = name2Input;
            
            pendingNames = {
                player1: players[0].name,
                player2: players[1].name
            };
            
            updateUIPlayers();
            showMessage(`✅ Имена обновлены: ${players[0].name} vs ${players[1].name}`);
        }
        
        // Исправленная функция "Случайный первый" — сразу перезапускает игру с новым первым игроком
        function randomizeFirstTurn() {
            if (waitingForAction) {
                showMessage("Подождите, идёт анимация...");
                return;
            }
            // Сохраняем текущие имена и режим
            const currentMode = spinMode;
            const name1 = players[0].name;
            const name2 = players[1].name;
            
            // Случайный выбор первого игрока
            const newFirst = Math.random() < 0.5 ? 0 : 1;
            
            // Обновляем имена (если были изменены через поля, но не применены)
            const name1Input = document.getElementById('player1Name').value.trim();
            const name2Input = document.getElementById('player2Name').value.trim();
            if (name1Input) players[0].name = name1Input;
            if (name2Input) players[1].name = name2Input;
            
            // Принудительно перезапускаем игру с новым первым игроком
            gameActive = true;
            waitingForAction = false;
            players.forEach(p => p.alive = true);
            
            // Синхронизируем режим с радиокнопками
            const spinRadio = document.querySelector('input[value="spin"]');
            spinMode = spinRadio ? spinRadio.checked : false;
            
            if (spinMode) {
                bulletInChamber = Math.floor(Math.random() * 6);
            } else {
                fatalShotNumber = Math.floor(Math.random() * 6) + 1;
                currentShotNumber = 1;
            }
            
            currentPlayerIdx = newFirst;
            
            updateUIPlayers();
            renderCylinder();
            updateChanceDisplay();
            document.getElementById('shootBtn').disabled = false;
            
            const chance = getCurrentChance();
            const modeText = spinMode ? "С ВРАЩЕНИЕМ (всегда 1/6)" : "БЕЗ ВРАЩЕНИЯ (шанс растёт)";
            showMessage(`🎲 СЛУЧАЙНЫЙ ПЕРВЫЙ! Теперь первым стреляет ${players[currentPlayerIdx].name}. Режим: ${modeText}. Шанс: ${chance.percent}% (${chance.text})`);
            setTimeout(()=>{ renderAllCharacters(); }, 30);
        }
        
        function init() {
            for(let p of players) {
                const canvas = document.getElementById(p.canvasId);
                if(canvas) { canvas.width = 280; canvas.height = 280; }
            }
            
            document.getElementById('player1Name').value = players[0].name;
            document.getElementById('player2Name').value = players[1].name;
            
            newGame(true);
            
            document.getElementById('shootBtn').addEventListener('click', (e) => {
                e.preventDefault();
                if(!gameActive) { showMessage("Игра окончена. Новая игра."); return; }
                if(waitingForAction) return;
                performShot();
            });
            
            document.getElementById('resetBtn').addEventListener('click', (e) => {
                e.preventDefault();
                if(waitingForAction) { showMessage("Подождите..."); return; }
                newGame(true);
            });
            
            document.getElementById('applyNamesBtn').addEventListener('click', () => applyNames());
            document.getElementById('randomizeFirstBtn').addEventListener('click', () => randomizeFirstTurn());
            
            // Слушаем изменение режима
            const radios = document.querySelectorAll('input[name="mode"]');
            radios.forEach(radio => {
                radio.addEventListener('change', () => {
                    if (!gameActive || (spinMode ? true : currentShotNumber === 1)) {
                        newGame(true);
                    } else {
                        showMessage("⚠️ Режим можно сменить только перед началом новой игры. Нажмите «Новая игра».");
                        const oldSpin = spinMode;
                        document.querySelector(`input[value="${oldSpin ? 'spin' : 'noSpin'}"]`).checked = true;
                    }
                });
            });
            
            document.body.addEventListener('click', () => {
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                else if(!audioCtx) initAudio();
            }, { once: true });
        }
        
        init();
    })();
</script>
</body>
