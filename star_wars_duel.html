<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Star Wars | Duel of the Fates</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #0a0a1a 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Courier New', monospace;
            padding: 20px;
            margin: 0;
        }
        .arena {
            max-width: 1200px;
            width: 100%;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(6px);
            border-radius: 56px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 2px solid #ffcc44;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            color: #ffcc44;
            text-shadow: 0 0 8px #ff6600;
            letter-spacing: 3px;
        }
        .sub {
            text-align: center;
            color: #aa9955;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        .fighters {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .fighter-card {
            flex: 1;
            background: #1a1a2aee;
            border-radius: 48px;
            padding: 20px;
            text-align: center;
            border: 2px solid #ffcc44;
            transition: 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .fighter-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ffdd77;
            text-shadow: 2px 2px 0 #aa3300;
            margin-bottom: 15px;
        }
        .health-bar-container {
            background: #2a1a0a;
            border-radius: 30px;
            height: 24px;
            width: 100%;
            margin: 12px 0;
            overflow: hidden;
            border: 1px solid #ffcc44;
        }
        .health-bar {
            background: linear-gradient(90deg, #dd3333, #ff5555);
            width: 100%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.3s ease;
        }
        .health-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffcc88;
            margin: 6px 0;
        }
        .preset-select {
            margin: 12px 0;
            display: flex;
            justify-content: center;
        }
        .preset-select select {
            background: #2a2a3a;
            border: 2px solid #ffcc44;
            color: #ffdd99;
            padding: 6px 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            width: 95%;
            text-align: center;
            font-family: monospace;
        }
        .param-row {
            margin: 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            background: #0a0a14aa;
            padding: 6px 10px;
            border-radius: 40px;
        }
        .param-row label {
            font-weight: bold;
            color: #ffcc88;
            min-width: 110px;
            text-align: left;
            font-size: 0.9rem;
        }
        .param-row input {
            flex: 1;
            background: #2a2a3a;
            border: 1px solid #ffcc44;
            color: #ffdd99;
            padding: 5px 10px;
            border-radius: 40px;
            font-weight: bold;
            text-align: center;
            font-size: 0.9rem;
        }
        .param-row span {
            color: #ffaa66;
            font-weight: bold;
            min-width: 30px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 20px;
            flex-wrap: wrap;
        }
        button {
            background: #8b3c2a;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 28px;
            border-radius: 60px;
            color: #ffcfb0;
            cursor: pointer;
            box-shadow: 0 4px 0 #541e0e;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #541e0e;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .reset-btn {
            background: #2c3a2a;
            box-shadow: 0 4px 0 #1a2a10;
        }
        .round-btn {
            background: #aa6a2a;
            box-shadow: 0 4px 0 #6a3a1a;
            font-size: 1.3rem;
        }
        .round-display {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffcc44;
            text-shadow: 0 0 10px #ff6600;
            background: #000000aa;
            padding: 12px;
            border-radius: 60px;
            margin-top: 20px;
            border: 1px solid #ffcc44;
            letter-spacing: 4px;
        }
        .winner-message {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-top: 15px;
            color: #ffaa66;
            background: #000000aa;
            padding: 10px;
            border-radius: 40px;
        }
        .vs {
            font-size: 2rem;
            font-weight: bold;
            color: #ffaa44;
            align-self: center;
            text-shadow: 0 0 5px red;
        }
        @media (max-width: 850px) {
            .fighters { flex-direction: column; }
            .vs { display: none; }
        }
    </style>
</head>
<body>

<script>
    // ---------- ЗВУКИ ----------
    let audioCtx = null;
    function initAudio() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    
    function playHitSound() {
        if (!audioCtx) { initAudio(); }
        if (!audioCtx) return;
        const resumePlay = () => {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.value = 180;
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.12);
            osc.start();
            osc.stop(now + 0.1);
            const noiseGain = audioCtx.createGain();
            const noiseNode = audioCtx.createScriptProcessor(256, 1, 1);
            noiseNode.onaudioprocess = function(e) {
                const output = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < 256; i++) output[i] = (Math.random() * 2 - 1) * 0.1;
            };
            noiseNode.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noiseGain.gain.setValueAtTime(0.08, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
            setTimeout(() => { try { noiseNode.disconnect(); } catch(e) {} }, 150);
        };
        if (audioCtx.state === 'suspended') audioCtx.resume().then(resumePlay);
        else resumePlay();
    }
    
    function playImpactSound() {
        if (!audioCtx) { initAudio(); }
        if (!audioCtx) return;
        const resumePlay = () => {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.value = 320;
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.15);
            osc.start();
            osc.stop(now + 0.12);
        };
        if (audioCtx.state === 'suspended') audioCtx.resume().then(resumePlay);
        else resumePlay();
    }
    
    function playKnockdownSound() {
        if (!audioCtx) { initAudio(); }
        if (!audioCtx) return;
        const resumePlay = () => {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sawtooth';
            osc.frequency.value = 80;
            gain.gain.setValueAtTime(0.35, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.6);
            osc.start();
            osc.stop(now + 0.8);
            const noiseGain = audioCtx.createGain();
            const noiseNode = audioCtx.createScriptProcessor(512, 1, 1);
            noiseNode.onaudioprocess = function(e) {
                const output = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < 512; i++) output[i] = (Math.random() * 2 - 1) * 0.25;
            };
            noiseNode.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noiseGain.gain.setValueAtTime(0.3, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            setTimeout(() => { try { noiseNode.disconnect(); } catch(e) {} }, 600);
        };
        if (audioCtx.state === 'suspended') audioCtx.resume().then(resumePlay);
        else resumePlay();
    }
    
    function playFightEndSound() {
        if (!audioCtx) { initAudio(); }
        if (!audioCtx) return;
        const resumePlay = () => {
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 440;
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
            osc.frequency.setValueAtTime(440, now);
            osc.frequency.exponentialRampToValueAtTime(880, now + 0.8);
            osc.start();
            osc.stop(now + 1.2);
        };
        if (audioCtx.state === 'suspended') audioCtx.resume().then(resumePlay);
        else resumePlay();
    }
    
    // ---------- БАЗА ДАННЫХ ПЕРСОНАЖЕЙ STAR WARS ----------
    const characters = {
        luke: { name: "ЛЮК СКАЙУОКЕР", health: 100, damage: 27, accuracy: 78, koChance: 5 },
        vader: { name: "ДАРТ ВЕЙДЕР", health: 120, damage: 30, accuracy: 70, koChance: 7 },
        palpatine: { name: "ИМПЕРАТОР ПАЛПАТИН", health: 95, damage: 32, accuracy: 65, koChance: 10 },
        obiwan: { name: "ОБИ-ВАН КЕНОБИ", health: 105, damage: 26, accuracy: 82, koChance: 5 },
        maul: { name: "ДАРТ МОЛ", health: 100, damage: 29, accuracy: 74, koChance: 7 },
        yoda: { name: "ЙОДА", health: 90, damage: 28, accuracy: 85, koChance: 6 },
        han: { name: "ХАН СОЛО", health: 95, damage: 25, accuracy: 80, koChance: 4 },
        leia: { name: "ЛЕЯ ОРГАНА", health: 95, damage: 24, accuracy: 82, koChance: 4 },
        rey: { name: "РЕЙ", health: 100, damage: 26, accuracy: 79, koChance: 5 },
        kylo: { name: "КАЙЛО РЕН", health: 110, damage: 28, accuracy: 73, koChance: 6 },
        dooku: { name: "ГРАФ ДУКУ", health: 105, damage: 27, accuracy: 77, koChance: 6 },
        grievous: { name: "ГЕНЕРАЛ ГРИВУС", health: 115, damage: 29, accuracy: 68, koChance: 7 },
        fett: { name: "БОБА ФЕТТ", health: 100, damage: 26, accuracy: 81, koChance: 5 },
        ahsoka: { name: "АСОКА ТАНО", health: 98, damage: 25, accuracy: 83, koChance: 4 },
        mando: { name: "МАНДАЛОРЕЦ", health: 105, damage: 27, accuracy: 76, koChance: 5 },
        thrawn: { name: "ГРАНД-АДМИРАЛ ТРАУН", health: 100, damage: 24, accuracy: 88, koChance: 4 }
    };
    
    // ---------- ПЕРЕМЕННЫЕ БОЯ ----------
    let fighter1 = {
        name: "БОЕЦ 1",
        maxHealth: 100,
        health: 100,
        damage: 25,
        accuracy: 0.70,
        baseKoChance: 0.05
    };
    let fighter2 = {
        name: "БОЕЦ 2",
        maxHealth: 100,
        health: 100,
        damage: 25,
        accuracy: 0.70,
        baseKoChance: 0.05
    };
    let gameActive = true;
    let roundCount = 0;
    
    // DOM элементы
    const name1Display = document.getElementById('name1Display');
    const name2Display = document.getElementById('name2Display');
    const health1Display = document.getElementById('health1Display');
    const health2Display = document.getElementById('health2Display');
    const healthBar1 = document.getElementById('healthBar1');
    const healthBar2 = document.getElementById('healthBar2');
    const roundDisplay = document.getElementById('roundDisplay');
    const winnerMessageDiv = document.getElementById('winnerMessage');
    const nextRoundBtn = document.getElementById('nextRoundBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    // Поля ввода
    const fighterName1 = document.getElementById('fighterName1');
    const fighterHealth1 = document.getElementById('health1');
    const fighterDamage1 = document.getElementById('damage1');
    const fighterAccuracy1 = document.getElementById('accuracy1');
    const fighterKoChance1 = document.getElementById('koChance1');
    const fighterName2 = document.getElementById('fighterName2');
    const fighterHealth2 = document.getElementById('health2');
    const fighterDamage2 = document.getElementById('damage2');
    const fighterAccuracy2 = document.getElementById('accuracy2');
    const fighterKoChance2 = document.getElementById('koChance2');
    
    // Выпадающие списки
    const presetSelect1 = document.getElementById('presetSelect1');
    const presetSelect2 = document.getElementById('presetSelect2');
    
    function updateUI() {
        name1Display.textContent = fighter1.name;
        name2Display.textContent = fighter2.name;
        health1Display.innerHTML = `❤️ ${Math.max(0, Math.floor(fighter1.health))} / ${fighter1.maxHealth}`;
        health2Display.innerHTML = `❤️ ${Math.max(0, Math.floor(fighter2.health))} / ${fighter2.maxHealth}`;
        const percent1 = (fighter1.health / fighter1.maxHealth) * 100;
        const percent2 = (fighter2.health / fighter2.maxHealth) * 100;
        healthBar1.style.width = Math.max(0, percent1) + '%';
        healthBar2.style.width = Math.max(0, percent2) + '%';
        nextRoundBtn.disabled = !gameActive || fighter1.health <= 0 || fighter2.health <= 0;
        roundDisplay.innerHTML = gameActive ? `РАУНД ${roundCount}` : `БОЙ ЗАВЕРШЁН`;
    }
    
    function setWinnerMessage(msg) {
        winnerMessageDiv.innerHTML = msg;
    }
    
    function loadParamsToFighters(resetHealth = true) {
        fighter1.name = fighterName1.value.trim() || "БОЕЦ 1";
        fighter1.maxHealth = Math.max(1, parseFloat(fighterHealth1.value) || 100);
        fighter1.damage = Math.max(1, parseFloat(fighterDamage1.value) || 25);
        fighter1.accuracy = Math.min(1, Math.max(0, (parseFloat(fighterAccuracy1.value) || 70) / 100));
        fighter1.baseKoChance = Math.min(0.30, Math.max(0, (parseFloat(fighterKoChance1.value) || 5) / 100));
        
        fighter2.name = fighterName2.value.trim() || "БОЕЦ 2";
        fighter2.maxHealth = Math.max(1, parseFloat(fighterHealth2.value) || 100);
        fighter2.damage = Math.max(1, parseFloat(fighterDamage2.value) || 25);
        fighter2.accuracy = Math.min(1, Math.max(0, (parseFloat(fighterAccuracy2.value) || 70) / 100));
        fighter2.baseKoChance = Math.min(0.30, Math.max(0, (parseFloat(fighterKoChance2.value) || 5) / 100));
        
        if (resetHealth) {
            fighter1.health = fighter1.maxHealth;
            fighter2.health = fighter2.maxHealth;
        } else {
            fighter1.health = Math.min(fighter1.health, fighter1.maxHealth);
            fighter2.health = Math.min(fighter2.health, fighter2.maxHealth);
        }
    }
    
    function setCharacterToFields(side, charKey) {
        const char = characters[charKey];
        if (!char) return;
        if (side === 1) {
            fighterName1.value = char.name;
            fighterHealth1.value = char.health;
            fighterDamage1.value = char.damage;
            fighterAccuracy1.value = char.accuracy;
            fighterKoChance1.value = char.koChance;
        } else {
            fighterName2.value = char.name;
            fighterHealth2.value = char.health;
            fighterDamage2.value = char.damage;
            fighterAccuracy2.value = char.accuracy;
            fighterKoChance2.value = char.koChance;
        }
        if (side === 1) {
            presetSelect1.value = "";
        } else {
            presetSelect2.value = "";
        }
        resetBattle();
    }
    
    presetSelect1.addEventListener('change', (e) => {
        if (e.target.value) {
            setCharacterToFields(1, e.target.value);
        }
    });
    presetSelect2.addEventListener('change', (e) => {
        if (e.target.value) {
            setCharacterToFields(2, e.target.value);
        }
    });
    
    function checkKoByChance(attacker, defender, attackerBaseChance, round) {
        if (defender.health <= 0) return false;
        let healthRatio = attacker.health / Math.max(1, defender.health);
        let chance = healthRatio * attackerBaseChance;
        chance = Math.min(0.95, Math.max(0, chance));
        let roll = Math.random();
        return roll < chance;
    }
    
    function executeRound() {
        if (!gameActive) return;
        if (fighter1.health <= 0 || fighter2.health <= 0) return;
        
        roundCount++;
        updateUI();
        
        playHitSound();
        
        let hit1 = Math.random() <= fighter1.accuracy;
        let hit2 = Math.random() <= fighter2.accuracy;
        
        let damageTo2 = 0;
        let damageTo1 = 0;
        
        if (hit1) {
            damageTo2 = fighter1.damage;
            fighter2.health -= damageTo2;
        }
        if (hit2) {
            damageTo1 = fighter2.damage;
            fighter1.health -= damageTo1;
        }
        
        fighter1.health = Math.max(0, fighter1.health);
        fighter2.health = Math.max(0, fighter2.health);
        
        if (hit1 || hit2) playImpactSound();
        
        let koByChance1 = checkKoByChance(fighter1, fighter2, fighter1.baseKoChance, roundCount);
        let koByChance2 = checkKoByChance(fighter2, fighter1, fighter2.baseKoChance, roundCount);
        
        let koHappened = false;
        
        if (fighter1.health <= 0 && fighter2.health <= 0) {
            setWinnerMessage(`💀 ДВОЙНОЙ НОКАУТ! НИЧЬЯ! 💀`);
            gameActive = false;
            playKnockdownSound();
            playFightEndSound();
            koHappened = true;
        } else if (fighter1.health <= 0) {
            setWinnerMessage(`💀 НОКАУТ! ПОБЕДИТЕЛЬ — ${fighter2.name} в ${roundCount} РАУНДЕ! 💀`);
            gameActive = false;
            playKnockdownSound();
            playFightEndSound();
            koHappened = true;
        } else if (fighter2.health <= 0) {
            setWinnerMessage(`💀 НОКАУТ! ПОБЕДИТЕЛЬ — ${fighter1.name} в ${roundCount} РАУНДЕ! 💀`);
            gameActive = false;
            playKnockdownSound();
            playFightEndSound();
            koHappened = true;
        } else if (koByChance1) {
            fighter2.health = 0;
            setWinnerMessage(`💀 НОКАУТ! ${fighter1.name} побеждает! (Сила Тёмной стороны) 💀`);
            gameActive = false;
            playKnockdownSound();
            playFightEndSound();
            koHappened = true;
        } else if (koByChance2) {
            fighter1.health = 0;
            setWinnerMessage(`💀 НОКАУТ! ${fighter2.name} побеждает! (Сила Тёмной стороны) 💀`);
            gameActive = false;
            playKnockdownSound();
            playFightEndSound();
            koHappened = true;
        }
        
        updateUI();
        if (koHappened) nextRoundBtn.disabled = true;
    }
    
    function resetBattle() {
        loadParamsToFighters(true);
        gameActive = true;
        roundCount = 0;
        setWinnerMessage("");
        updateUI();
        nextRoundBtn.disabled = false;
        if (audioCtx && audioCtx.state !== 'suspended') playHitSound();
    }
    
    document.getElementById('resetBtn').addEventListener('click', resetBattle);
    document.getElementById('nextRoundBtn').addEventListener('click', () => {
        if (!gameActive) return;
        if (fighter1.health <= 0 || fighter2.health <= 0) return;
        executeRound();
    });
    
    document.body.addEventListener('click', () => {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        else if (!audioCtx) initAudio();
    }, { once: true });
    
    resetBattle();
</script>
