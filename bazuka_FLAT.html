<!DOCTYPE html>
<html lang="ru">
<head>

    <style>
        * { user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(145deg, #0a0f1e 0%, #0c1225 100%); display: flex; justify-content: center; align-items: center; font-family: 'Courier New', 'Press Start 2P', monospace; }

        canvas { display: block; margin: 0 auto; border-radius: 20px; box-shadow: 0 0 0 4px #ff8800, 0 0 0 8px #3a2a1a; cursor: crosshair; background-color: #0a0a1a; }
        .info-panel { display: flex; justify-content: space-between; align-items: baseline; margin-top: 16px; color: #ffd966; text-shadow: 2px 2px 0 #7a2e00; font-weight: bold; font-size: 18px; background: #11171fcc; padding: 8px 20px; border-radius: 60px; backdrop-filter: blur(4px); flex-wrap: wrap; gap: 10px; }
        .score-box, .health-box { background: #000000aa; padding: 5px 16px; border-radius: 32px; letter-spacing: 1px; white-space: nowrap; }
        .controls-tip { font-size: 12px; background: #2e241f; padding: 6px 16px; border-radius: 24px; color: #f5bc70; font-family: monospace; font-weight: bold; white-space: nowrap; }
        button { background: #ff9f4a; border: none; font-family: inherit; font-weight: bold; font-size: 16px; padding: 6px 18px; border-radius: 40px; cursor: pointer; box-shadow: 0 4px 0 #8b3c00; transition: 0.07s linear; }
        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #8b3c00; }
        .sound-toggle, .pause-btn, .ai-toggle-btn { background: #3a2a1f; padding: 5px 12px; border-radius: 50px; font-size: 13px; cursor: pointer; transition: 0.1s linear; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
        .sound-toggle:hover, .pause-btn:hover, .ai-toggle-btn:hover { background: #5e3e2a; }
        .ai-toggle-btn.ai-active { background: #2a5a3a; box-shadow: 0 0 8px #44ff44; color: #aaffaa; }
        .slider-container { display: flex; align-items: center; gap: 12px; background: #2a1a0a; padding: 5px 15px; border-radius: 40px; font-size: 13px; white-space: nowrap; }
        .slider-container input { width: 130px; cursor: pointer; }
        .slider-container span { min-width: 65px; text-align: center; }
        .pause-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000; font-family: monospace; font-size: 48px; color: #ffaa44; backdrop-filter: blur(4px); pointer-events: none; }
        .pause-overlay.hidden { display: none; }
        .character-select { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 2000; font-family: monospace; }

        .select-container { background: #2a1a0a; border-radius: 48px; padding: 30px 50px; text-align: center; border: 3px solid #ffaa44; box-shadow: 0 0 30px rgba(255,170,68,0.3); }

        .char-card.selected { border-color: #ffaa44; box-shadow: 0 0 15px #ffaa44; background: #2a2a2a; }
        .char-preview { width: 200px; height: 220px; position: relative; margin-bottom: 15px; background: #0a0a1a; border-radius: 12px; overflow: visible; }

        .char-card span { color: #ffd966; font-size: 20px; display: block; }
        .start-btn { background: #ff9f4a; border: none; font-family: inherit; font-weight: bold; font-size: 24px; padding: 12px 40px; border-radius: 60px; cursor: pointer; box-shadow: 0 6px 0 #8b3c00; transition: 0.07s linear; color: #2a1a0a; margin-top: 10px; }
        .start-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #8b3c00; }
        .minimap { position: fixed; bottom: 20px; right: 20px; width: 200px; height: 200px; background: rgba(0,0,0,0.7); border: 2px solid #ffaa44; border-radius: 8px; z-index: 500; }
        .minimap canvas { width: 100%; height: 100%; border-radius: 4px; cursor: pointer; }
    </style>
</head>

(function(){
    let selectedCharacter = 'kachok';

    // Функции взрывов (сокращены)
    function createGroundExplosion(cx,cy){let p=[];for(let i=0;i<14;i++)p.push({x:cx,y:cy,vx:(Math.random()-0.5)*14,vy:(Math.random()-0.5)*12,size:3+Math.random()*6,color:"#ff3333",life:12});activeExplosions.push({particles:p,frame:0,duration:12});}
    function createFlyingExplosion(cx,cy){let p=[];for(let i=0;i<12;i++)p.push({x:cx,y:cy,vx:(Math.random()-0.5)*14,vy:(Math.random()-0.5)*14,size:3+Math.random()*6,color:"#8b3a4a",life:15});activeExplosions.push({particles:p,frame:0,duration:15});}
    function updateExplosions(){for(let i=0;i<activeExplosions.length;i++){let e=activeExplosions[i];e.frame++;let alive=false;for(let p of e.particles){p.x+=p.vx;p.y+=p.vy;if(--p.life>0)alive=true;}if(!alive||e.frame>=e.duration){activeExplosions.splice(i,1);i--;}}}
    function drawExplosions(ctx,cx,cy,cw,ch){for(let e of activeExplosions)for(let p of e.particles)if(p.life>0){let x=p.x-cx+cw/2,y=p.y-cy+ch/2;ctx.globalAlpha=Math.min(1,p.life/e.duration*0.8+0.2);ctx.fillStyle=p.color;ctx.beginPath();ctx.ellipse(x,y,p.size,p.size*0.8,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}}
    
    let soundExplosionCtx=null;
    function initSoundExplosion(){if(!soundExplosionCtx)soundExplosionCtx=new(window.AudioContext||window.webkitAudioContext)();}
    function playSoundFirePop(v=0.5){if(!globalSoundEnabled)return;try{if(!soundExplosionCtx)initSoundExplosion();if(soundExplosionCtx.state==='suspended')soundExplosionCtx.resume();const now=soundExplosionCtx.currentTime;const g=soundExplosionCtx.createGain();g.connect(soundExplosionCtx.destination);g.gain.setValueAtTime(v,now);g.gain.exponentialRampToValueAtTime(0.0001,now+0.25);const o1=soundExplosionCtx.createOscillator();o1.type='sawtooth';o1.frequency.value=300;o1.connect(g);o1.start();o1.stop(now+0.2);const o2=soundExplosionCtx.createOscillator();o2.type='square';o2.frequency.value=150;o2.connect(g);o2.start();o2.stop(now+0.15);const bs=soundExplosionCtx.sampleRate*0.08;const buf=soundExplosionCtx.createBuffer(1,bs,soundExplosionCtx.sampleRate);const data=buf.getChannelData(0);for(let i=0;i<bs;i++)data[i]=Math.random()*2-1;const n=soundExplosionCtx.createBufferSource();n.buffer=buf;n.connect(g);n.start();n.stop(now+0.08);}catch(e){}}

    // Превью персонажей

    function startGame(character){
        let audioCtx=null,isPaused=false;
        function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
        function playBeep(type,volume=0.3){
            if(!globalSoundEnabled||isPaused)return;
            if(!audioCtx){initAudio();if(audioCtx.state==='suspended'){audioCtx.resume().then(()=>playBeep(type,volume));return;}}
            if(audioCtx.state==='suspended'){audioCtx.resume().then(()=>playBeep(type,volume));return;}
            const now=audioCtx.currentTime;
            const osc=audioCtx.createOscillator();
            const gain=audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            let freq=440,duration=0.2;
            switch(type){
                case'shoot':freq=180;duration=0.2;osc.type='sawtooth';break;
                case'explode':freq=100;duration=0.28;osc.type='triangle';break;
                case'hurt':freq=120;duration=0.35;osc.type='square';break;
                case'fireball':freq=250;duration=0.15;osc.type='sine';break;
                case'gameover':freq=80;duration=0.9;osc.type='sawtooth';break;
                default:return;
            }
            gain.gain.setValueAtTime(volume,now);
            gain.gain.exponentialRampToValueAtTime(0.0001,now+duration);
            osc.frequency.setValueAtTime(freq,now);
            osc.start();
            osc.stop(now+duration);
        }
        function soundShoot(){playBeep('shoot',0.35);}
        function soundExplode(){playBeep('explode',0.45);}
        function soundHurt(){playBeep('hurt',0.5);}
        function soundFireball(){playBeep('fireball',0.25);}
        function soundGameOver(){playBeep('gameover',0.6);}
        
        const canvas=document.getElementById('gameCanvas');
        const ctx=canvas.getContext('2d');
        const pauseOverlay=document.getElementById('pauseOverlay');
        const minimapContainer=document.getElementById('minimapContainer');
        const minimapCanvas=document.getElementById('minimapCanvas');
        const minimapCtx=minimapCanvas.getContext('2d');
        minimapContainer.style.display='block';
        
        const CANVAS_WIDTH=1000,CANVAS_HEIGHT=500;
        const WORLD_MIN=CONFIG.WORLD_MIN, WORLD_MAX=CONFIG.WORLD_MAX;
        const PLAYER_SPEED=CONFIG.PLAYER_SPEED;
        const PLAYER_WIDTH=CONFIG.PLAYER_WIDTH;
        const PLAYER_HEIGHT=CONFIG.PLAYER_HEIGHT;
        
        let player={worldX:0,worldY:0,width:PLAYER_WIDTH,height:PLAYER_HEIGHT,vx:0,vy:0,facingRight:true,walkCycle:0,legSwing:0,bazookaAngle:0};
        let groundMonsters=[],armoredMonsters=[],flyingMonsters=[],guardians=[],casters=[],fireballs=[],bullets=[];
        let score=0,health=CONFIG.PLAYER_START_HEALTH,gameRunning=true,gameOverSoundPlayed=false;
        let aiMode=false,aiTarget={worldX:0,worldY:0},targetAngle=0,aiDirectionX=0,aiDirectionY=0,aiUpdateTimer=0,aiDirectionTimer=0;
        const DIRECTION_CHANGE_INTERVAL=0.6;

        const keys={KeyW:false,KeyS:false,KeyA:false,KeyD:false};
        let mouseScreenX=CANVAS_WIDTH/2,mouseScreenY=CANVAS_HEIGHT/2,mouseWorldX=0,mouseWorldY=0;
        let cameraX=0,cameraY=0,textureOffsetX=0,textureOffsetY=0;
        let spawnGroundTimer=8,spawnArmoredTimer=20,spawnFlyingTimer=15,spawnGuardianTimer=30,spawnCasterTimer=45;
        
        // Проверка коллизии со зданиями
        function checkBuildingCollision(x, y, w, h) {
            for (let b of BUILDINGS) {
                let left = b.x - b.w/2;
                let right = b.x + b.w/2;
                let top = b.y - b.d/2;
                let bottom = b.y + b.d/2;
                if (x < right && x + w > left && y < bottom && y + h > top) {
                    return true;
                }
            }
            return false;
        }
        
        function getCurrentSpeedBonus(){
            let bonus = CONFIG.SPEED_BONUS.START_BONUS + Math.floor(score / CONFIG.SPEED_BONUS.SCORE_PER_BONUS);
            if(bonus > CONFIG.SPEED_BONUS.MAX_BONUS) bonus = CONFIG.SPEED_BONUS.MAX_BONUS;
            return bonus;
        }
        
        function isFullyOnScreen(wx,w,wy,h){let l=cameraX-CANVAS_WIDTH/2,r=cameraX+CANVAS_WIDTH/2,t=cameraY-CANVAS_HEIGHT/2,b=cameraY+CANVAS_HEIGHT/2;return(wx+w>l&&wx<r&&wy+h>t&&wy<b);}
        function getSpawnPositionOutsideScreen(){let l=cameraX-CANVAS_WIDTH/2,r=cameraX+CANVAS_WIDTH/2,t=cameraY-CANVAS_HEIGHT/2,b=cameraY+CANVAS_HEIGHT/2,m=80;let side=Math.floor(Math.random()*4),x,y;if(side===0){x=l-m-Math.random()*150;y=t-m+Math.random()*(CANVAS_HEIGHT+m*2);}else if(side===1){x=r+m+Math.random()*150;y=t-m+Math.random()*(CANVAS_HEIGHT+m*2);}else if(side===2){x=l-m+Math.random()*(CANVAS_WIDTH+m*2);y=t-m-Math.random()*150;}else{x=l-m+Math.random()*(CANVAS_WIDTH+m*2);y=b+m+Math.random()*150;}return{x:Math.max(WORLD_MIN,Math.min(WORLD_MAX,x)),y:Math.max(WORLD_MIN,Math.min(WORLD_MAX,y))};}
        function calculateDanger(wx,wy,vx,vy,hv){let px=player.worldX+PLAYER_WIDTH/2,py=player.worldY+PLAYER_HEIGHT/2,d=Math.hypot(wx-px,wy-py);if(d<1)return 999;return(Math.hypot(vx,vy)*hv)/d;}
        function findMostDangerousTarget(){let best=-1,bestTarget=null;function check(wx,wy,vx,vy,hv){let d=calculateDanger(wx,wy,vx,vy,hv);if(d>best){best=d;bestTarget={worldX:wx,worldY:wy,vx:vx,vy:vy};}}for(let m of groundMonsters)check(m.worldX+m.width/2,m.y+m.height/2,m.vx,m.vy,CONFIG.GROUND_MONSTER_HEALTH);for(let m of armoredMonsters)check(m.worldX+m.width/2,m.y+m.height/2,m.vx,m.vy,CONFIG.ARMORED_MONSTER_HEALTH);for(let m of flyingMonsters)check(m.worldX+m.size/2,m.y+m.size/2,m.vx,m.vy,1);for(let m of guardians)check(m.worldX+m.size/2,m.y+m.size/2,m.vx,m.vy,1);for(let m of casters)check(m.worldX+m.width/2,m.y+m.height/2,0,0,CONFIG.CASTER_HEALTH);for(let fb of fireballs)check(fb.worldX,fb.worldY,fb.vx,fb.vy,1);return bestTarget;}
        function updateAI(dt){if(!aiMode||!gameRunning||isPaused)return;if(!autoFireEnabled){autoFireEnabled=true;if(!shootInterval)startShooting();performSingleShot();}aiDirectionTimer+=dt;if(aiDirectionTimer>=DIRECTION_CHANGE_INTERVAL){aiDirectionTimer=0;let t=findMostDangerousTarget();if(t){let dx=t.worldX-(player.worldX+PLAYER_WIDTH/2),dy=t.worldY-(player.worldY+PLAYER_HEIGHT/2),len=Math.hypot(dx,dy);if(len>0.01){aiDirectionX=dx/len;aiDirectionY=dy/len;}}else{aiDirectionX=(Math.random()-0.5)*2;aiDirectionY=(Math.random()-0.5)*2;let len=Math.hypot(aiDirectionX,aiDirectionY);if(len>0.01){aiDirectionX/=len;aiDirectionY/=len;}}}player.vx=aiDirectionX*PLAYER_SPEED;player.vy=aiDirectionY*PLAYER_SPEED;aiUpdateTimer+=dt;if(aiUpdateTimer>=0.02){aiUpdateTimer=0;let t=findMostDangerousTarget();if(t){aiTarget=t;let sx=player.worldX+(player.facingRight?player.width-8:8),sy=player.worldY+34;targetAngle=Math.atan2(t.worldY-sy,t.worldX-sx);}}let diff=targetAngle-player.bazookaAngle;while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;player.bazookaAngle+=diff*0.1;}
        function performSingleShot(){if(!gameRunning||isPaused)return;let sx=player.worldX+(player.facingRight?player.width-8:8),sy=player.worldY+34,tx=aiMode&&aiTarget?aiTarget.worldX:mouseWorldX,ty=aiMode&&aiTarget?aiTarget.worldY:mouseWorldY,dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy);if(len<0.01)len=1;bullets.push({worldX:sx,worldY:sy,w:10,h:10,vx:(dx/len)*CONFIG.BULLET_SPEED,vy:(dy/len)*CONFIG.BULLET_SPEED});let angle=Math.atan2(dy,dx);player.bazookaAngle=angle;if(dx>0)player.facingRight=true;else if(dx<0)player.facingRight=false;soundShoot();if(navigator.vibrate)navigator.vibrate(15);}
        function startShooting(){if(shootInterval)clearInterval(shootInterval);shootInterval=setInterval(()=>{if(gameRunning&&autoFireEnabled&&!isPaused)performSingleShot();},CONFIG.SHOOT_DELAY_MS);}
        function stopShooting(){if(shootInterval){clearInterval(shootInterval);shootInterval=null;}}
        function toggleAutoFire(){if(!gameRunning||isPaused)return;autoFireEnabled=!autoFireEnabled;if(autoFireEnabled){if(!shootInterval)startShooting();performSingleShot();}}
        function toggleAIMode(){aiMode=!aiMode;let btn=document.getElementById('aiToggleBtn');if(aiMode){btn.innerHTML="🤖 АВТОИГРА ВКЛ";btn.classList.add('ai-active');if(!autoFireEnabled){autoFireEnabled=true;if(!shootInterval)startShooting();}keys.KeyW=false;keys.KeyS=false;keys.KeyA=false;keys.KeyD=false;aiDirectionTimer=0;aiDirectionX=0;aiDirectionY=0;}else{btn.innerHTML="🤖 АВТОИГРА ВЫКЛ";btn.classList.remove('ai-active');}}
        function updateDensity(){let s=document.getElementById('densitySlider'),v=parseInt(s.value),sp=document.getElementById('densityValue');if(v<30)sp.innerHTML="МАЛО";else if(v<70)sp.innerHTML="НОРМ";else sp.innerHTML="МНОГО";let t=v/100;let factor=CONFIG.DENSITY_MULTIPLIER.MAX + (CONFIG.DENSITY_MULTIPLIER.MID - CONFIG.DENSITY_MULTIPLIER.MAX)*t*2;if(t<=0.5)factor=CONFIG.DENSITY_MULTIPLIER.MAX - (CONFIG.DENSITY_MULTIPLIER.MAX-CONFIG.DENSITY_MULTIPLIER.MID)*(t*2);else factor=CONFIG.DENSITY_MULTIPLIER.MID - (CONFIG.DENSITY_MULTIPLIER.MID-CONFIG.DENSITY_MULTIPLIER.MIN)*((t-0.5)*2);densityMultiplier=factor;}
        function spawnFireball(c){let sx=c.worldX+22,sy=c.y+15,tx=player.worldX+PLAYER_WIDTH/2,ty=player.worldY+PLAYER_HEIGHT/2,dx=tx-sx,dy=ty-sy,len=Math.hypot(dx,dy);if(len<0.01)return;fireballs.push({worldX:sx,worldY:sy,radius:CONFIG.FIREBALL_RADIUS,vx:(dx/len)*CONFIG.FIREBALL_SPEED,vy:(dy/len)*CONFIG.FIREBALL_SPEED});soundFireball();}

        function drawMinimap() {
            minimapCtx.fillStyle = "#1a1a2a";
            minimapCtx.fillRect(0, 0, 200, 200);
            // Рисуем здания
            for (let b of BUILDINGS) {
                let mx = (b.x - WORLD_MIN) / (WORLD_MAX - WORLD_MIN) * 200;
                let my = (b.y - WORLD_MIN) / (WORLD_MAX - WORLD_MIN) * 200;
                let mw = (b.w) / (WORLD_MAX - WORLD_MIN) * 200;
                let mh = (b.d) / (WORLD_MAX - WORLD_MIN) * 200;
                minimapCtx.fillStyle = b.roof;
                minimapCtx.fillRect(mx - mw/2, my - mh/2, mw, mh);
                minimapCtx.strokeStyle = "#ffaa44";
                minimapCtx.strokeRect(mx - mw/2, my - mh/2, mw, mh);
            }
            // Рисуем игрока
            let px = (player.worldX - WORLD_MIN) / (WORLD_MAX - WORLD_MIN) * 200;
            let py = (player.worldY - WORLD_MIN) / (WORLD_MAX - WORLD_MIN) * 200;
            minimapCtx.fillStyle = "#00ff00";
            minimapCtx.beginPath();
            minimapCtx.arc(px, py, 3, 0, Math.PI*2);
            minimapCtx.fill();
            minimapCtx.fillStyle = "#ff0000";
            minimapCtx.font = "bold 10px monospace";
            minimapCtx.fillText("P", px-3, py-3);
        }

        function drawTopDownBuilding(b) {
            let x = b.x - cameraX + CANVAS_WIDTH/2;
            let y = b.y - cameraY + CANVAS_HEIGHT/2;
            let w = b.w;
            let d = b.d;
            if (x + w/2 < 0 || x - w/2 > CANVAS_WIDTH || y + d/2 < 0 || y - d/2 > CANVAS_HEIGHT) return;
            
            let offsetX = Math.min(15, b.w * 0.1);
            let offsetY = Math.min(15, b.d * 0.12);
            
            // Стены (тень/объём)
            ctx.fillStyle = b.wall;
            ctx.fillRect(x - w/2 + offsetX, y - d/2 + offsetY, w, d);
            // Крыша
            ctx.fillStyle = b.roof;
            ctx.fillRect(x - w/2, y - d/2, w, d);
            ctx.strokeStyle = "#2a2a2a";
            ctx.strokeRect(x - w/2, y - d/2, w, d);
            
            // Окна
            let winSize = Math.min(8, w/8);
            let winCountX = Math.max(1, Math.floor(w / 25));
            let winCountY = Math.max(1, Math.floor(d / 25));
            let stepX = w / (winCountX + 1);
            let stepY = d / (winCountY + 1);
            for (let i = 1; i <= winCountX; i++) {
                for (let j = 1; j <= winCountY; j++) {
                    let wx = x - w/2 + i * stepX;
                    let wy = y - d/2 + j * stepY;
                    ctx.fillStyle = b.detail;
                    ctx.fillRect(wx - winSize/2, wy - winSize/2, winSize, winSize);
                    ctx.fillStyle = "#1a2a3a";
                    ctx.fillRect(wx - winSize/3, wy - winSize/3, winSize*0.66, winSize*0.66);
                }
            }
            // Дверь
            let doorW = w * 0.2;
            let doorH = d * 0.15;
            let doorX = x - doorW/2;
            let doorY = y + d/2 - doorH;
            ctx.fillStyle = "#4A3A2A";
            ctx.fillRect(doorX, doorY, doorW, doorH);
            ctx.fillStyle = b.detail;
            ctx.fillRect(doorX + doorW/2 - 2, doorY + doorH/2 - 3, 4, 6);
        }
        
        function drawTexturedGround(){if(!groundPattern)groundPattern=createGroundPattern();ctx.save();ctx.translate(textureOffsetX%128,textureOffsetY%128);ctx.fillStyle=groundPattern;ctx.fillRect(-textureOffsetX%128,-textureOffsetY%128,CANVAS_WIDTH+128,CANVAS_HEIGHT+128);ctx.restore();ctx.fillStyle="rgba(0,0,0,0.15)";ctx.fillRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT);let l=WORLD_MIN-cameraX+CANVAS_WIDTH/2,r=WORLD_MAX-cameraX+CANVAS_WIDTH/2,t=WORLD_MIN-cameraY+CANVAS_HEIGHT/2,b=WORLD_MAX-cameraY+CANVAS_HEIGHT/2;ctx.strokeStyle="#ff6644";ctx.lineWidth=3;ctx.setLineDash([8,8]);ctx.strokeRect(l,t,r-l,b-t);ctx.setLineDash([]);ctx.fillStyle="#ffaa44";ctx.font="bold 14px monospace";ctx.fillText("⛔",l-12,t-8);ctx.fillText("⛔",r+4,t-8);ctx.fillText("⛔",l-12,b+12);ctx.fillText("⛔",r+4,b+12);ctx.fillStyle="rgba(0,0,0,0.3)";if(l>0)ctx.fillRect(0,0,l,CANVAS_HEIGHT);if(r<CANVAS_WIDTH)ctx.fillRect(r,0,CANVAS_WIDTH-r,CANVAS_HEIGHT);if(t>0)ctx.fillRect(l,0,r-l,t);if(b<CANVAS_HEIGHT)ctx.fillRect(l,b,r-l,CANVAS_HEIGHT-b);}
        
        function draw(){drawTexturedGround();for(let b of BUILDINGS)drawTopDownBuilding(b);for(let m of groundMonsters)drawGroundMonster(m);for(let m of armoredMonsters)drawArmoredMonster(m);for(let m of flyingMonsters)drawFlyingMonster(m);for(let m of guardians)drawGuardian(m);for(let c of casters)drawCaster(c);for(let fb of fireballs)drawFireball(fb);for(let b of bullets)drawBullet(b);let psx=CANVAS_WIDTH/2-PLAYER_WIDTH/2,psy=CANVAS_HEIGHT/2-PLAYER_HEIGHT/2;if(character==='kachok')drawKachok(psx,psy,player.facingRight,player.legSwing,player.bazookaAngle);else drawSnezhana(psx,psy,player.facingRight,player.legSwing,player.bazookaAngle);drawExplosions(ctx,cameraX,cameraY,CANVAS_WIDTH,CANVAS_HEIGHT);if(!aiMode){ctx.beginPath();ctx.moveTo(mouseScreenX-12,mouseScreenY);ctx.lineTo(mouseScreenX+12,mouseScreenY);ctx.moveTo(mouseScreenX,mouseScreenY-12);ctx.lineTo(mouseScreenX,mouseScreenY+12);ctx.strokeStyle="#ffaa44";ctx.lineWidth=2;ctx.stroke();ctx.beginPath();ctx.arc(mouseScreenX,mouseScreenY,8,0,Math.PI*2);ctx.stroke();}if(!gameRunning&&!isPaused){ctx.font="bold 38monospace";ctx.fillStyle="#ff3366";ctx.fillText("💀 GAME OVER 💀",CANVAS_WIDTH/2-150,150);ctx.font="18px monospace";ctx.fillStyle="#ffdd99";ctx.fillText("нажми [ЗАНОВО] чтобы продолжить",CANVAS_WIDTH/2-170,220);}ctx.font="bold 14monospace";ctx.fillStyle="#ffd966";ctx.fillText(`👹:${groundMonsters.length} 🛡️:${armoredMonsters.length} 🦇:${flyingMonsters.length} ⚡:${guardians.length} 🧙:${casters.length} 🔥:${fireballs.length}`,20,45);if(autoFireEnabled&&gameRunning&&!isPaused){ctx.font="bold 14monospace";ctx.fillStyle="#ffaa44";ctx.fillText("⚡ АВТО-ОЧЕРЕДЬ",CANVAS_WIDTH-180,40);}if(aiMode&&gameRunning&&!isPaused){ctx.font="bold 14monospace";ctx.fillStyle="#44ff44";ctx.fillText("🤖 АВТОИГРА",CANVAS_WIDTH-160,70);}}
        
        const soundToggleBtn=document.getElementById('soundToggleBtn');
        soundToggleBtn.addEventListener('click',()=>{globalSoundEnabled=!globalSoundEnabled;soundToggleBtn.innerHTML=globalSoundEnabled?"🔊 ЗВУК ВКЛ":"🔇 ЗВУК ВЫКЛ";if(globalSoundEnabled&&audioCtx&&audioCtx.state==='suspended')audioCtx.resume();if(globalSoundEnabled&&soundExplosionCtx&&soundExplosionCtx.state==='suspended')soundExplosionCtx.resume();});
        
        function handleKeyDown(e){let code=e.code;if(!aiMode&&(code==='KeyW'||code==='KeyS'||code==='KeyA'||code==='KeyD')){e.preventDefault();keys[code]=true;if(audioCtx?.state==='suspended')audioCtx.resume();}if(code==='Space'){e.preventDefault();togglePause();}}
        function handleKeyUp(e){let code=e.code;if(!aiMode&&(code==='KeyW'||code==='KeyS'||code==='KeyA'||code==='KeyD')){e.preventDefault();keys[code]=false;}}
        function handleMouseMove(e){if(aiMode)return;const rect=canvas.getBoundingClientRect();const sx=CANVAS_WIDTH/rect.width,sy=CANVAS_HEIGHT/rect.height;let cx=(e.clientX-rect.left)*sx,cy=(e.clientY-rect.top)*sy;mouseScreenX=Math.min(CANVAS_WIDTH,Math.max(0,cx));mouseScreenY=Math.min(CANVAS_HEIGHT,Math.max(0,cy));mouseWorldX=mouseScreenX+cameraX-CANVAS_WIDTH/2;mouseWorldY=mouseScreenY+cameraY-CANVAS_HEIGHT/2;}
        function handleMouseDown(e){if(e.button===0&&!aiMode){e.preventDefault();if(!gameRunning||isPaused)return;if(audioCtx?.state==='suspended')audioCtx.resume();toggleAutoFire();if(!shootInterval&&autoFireEnabled)startShooting();else if(!autoFireEnabled&&shootInterval)stopShooting();}}
        
        canvas.addEventListener('mousemove',handleMouseMove);
        canvas.addEventListener('mousedown',handleMouseDown);
        canvas.addEventListener('contextmenu',(e)=>e.preventDefault());
        window.addEventListener('keydown',handleKeyDown);
        window.addEventListener('keyup',handleKeyUp);
        document.getElementById('resetBtn').addEventListener('click',()=>{resetGame();if(audioCtx)audioCtx.resume();});
        document.getElementById('aiToggleBtn').addEventListener('click',toggleAIMode);
        document.getElementById('pauseBtn').addEventListener('click',togglePause);
        const densitySlider=document.getElementById('densitySlider');
        densitySlider.addEventListener('input',()=>{updateDensity();spawnGroundTimer=Math.min(spawnGroundTimer,getCurrentGroundDelay());spawnArmoredTimer=Math.min(spawnArmoredTimer,getCurrentArmoredDelay());spawnFlyingTimer=Math.min(spawnFlyingTimer,getCurrentFlyingDelay());spawnGuardianTimer=Math.min(spawnGuardianTimer,getCurrentGuardianDelay());spawnCasterTimer=Math.min(spawnCasterTimer,getCurrentCasterDelay());});
        document.body.addEventListener('click',()=>{if(!audioCtx)initAudio();audioCtx?.resume();},{once:true});
        resetGame();updateUI();updateDensity();
        function gameLoop(t){updateGame(t);draw();requestAnimationFrame(gameLoop);}
        gameLoop();
    }
})();
</script>
</body>
