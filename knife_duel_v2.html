<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дуэль через реку · управление мышью</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #1a2a1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        .game-wrapper {
            background: #2d3d2a;
            padding: 20px 20px 24px;
            border-radius: 40px 40px 28px 28px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            position: relative;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: inset 0 0 0 2px #4f6b4a, 0 10px 18px rgba(0,0,0,0.5);
            background: #b7d0b0;
            background-image: radial-gradient(circle at 20% 30%, #d4e8cd 2px, transparent 2px),
                              radial-gradient(circle at 80% 70%, #d4e8cd 1px, transparent 2px);
            background-size: 60px 60px, 80px 80px;
            cursor: none;
            width: 900px;
            height: 500px;
        }
        .ui-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding: 0 12px;
            color: #d8e6d0;
            font-weight: 500;
            text-shadow: 0 2px 3px #0f1f0c;
            flex-wrap: wrap;
            gap: 8px;
        }
        .info {
            background: #1f2e1b;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
            letter-spacing: 0.3px;
            box-shadow: inset 0 2px 5px #0a1309;
        }
        .info span {
            color: #f5d742;
            font-weight: 700;
        }
        .score-display {
            background: #1f2e1b;
            padding: 6px 20px;
            border-radius: 30px;
            font-size: 1rem;
            box-shadow: inset 0 2px 5px #0a1309;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .score-display .score-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .score-display .score-value {
            color: #f5d742;
            font-weight: 700;
            font-size: 1.2rem;
            min-width: 20px;
            text-align: center;
        }
        .hint {
            background: #263f21;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hint i {
            font-style: normal;
            display: inline-block;
            background: #394f33;
            padding: 0 8px;
            border-radius: 12px;
            color: #dbeed3;
        }
        #restartBtn {
            background: #f5d742;
            border: none;
            color: #1a2a1f;
            font-weight: bold;
            padding: 6px 22px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #b8972a;
            transition: 0.07s;
            display: inline-block;
        }
        #restartBtn:hover {
            transform: scale(1.03);
            background: #ffe066;
        }
        #restartBtn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .controls-hint {
            background: #1f2e1b;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #b0c8a0;
        }
        #autoPlayBtn {
            background: #2d6a3a;
            border: none;
            color: #d8e6d0;
            font-weight: bold;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 3px 0 #1a3f24;
            transition: 0.07s;
        }
        #autoPlayBtn:hover {
            transform: scale(1.03);
            background: #3a8a4a;
        }
        #autoPlayBtn:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        #autoPlayBtn.active {
            background: #8a3a3a;
            box-shadow: 0 3px 0 #5a2424;
        }
        #autoPlayBtn.active:hover {
            background: #aa4a4a;
        }
        .prob-controls {
            display: flex;
            gap: 16px;
            background: #1f2e1b;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #b0c8a0;
            align-items: center;
        }
        .prob-controls label {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .prob-controls input[type="range"] {
            width: 60px;
            height: 4px;
            accent-color: #f5d742;
            cursor: pointer;
        }
        .prob-controls .prob-value {
            color: #f5d742;
            font-weight: 700;
            min-width: 28px;
            text-align: center;
            font-size: 0.85rem;
        }
        .restart-hint {
            background: #1f2e1b;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #8a9a80;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="900" height="500"></canvas>
    <div class="ui-bar">
        <div class="info">⚔️ <span id="statusDisplay">ожидание</span></div>
        <div class="score-display">
            <div class="score-item">🏆 <span class="score-value" id="playerScore">0</span></div>
            <div class="score-item">💀 <span class="score-value" id="enemyScore">0</span></div>
            <div class="score-item">⚖️ <span class="score-value" id="drawScore">0</span></div>
        </div>
        <div class="prob-controls">
            <label>🤖 левый <input type="range" id="playerProbSlider" min="0" max="100" value="93"><span class="prob-value" id="playerProbDisplay">93</span>%</label>
            <label>👾 правый <input type="range" id="enemyProbSlider" min="0" max="100" value="93"><span class="prob-value" id="enemyProbDisplay">93</span>%</label>
        </div>
        <div class="controls-hint">🖱️ движение · <i>ЛКМ</i> бросок</div>
        <button id="autoPlayBtn">🤖 автоигра</button>
        <button id="restartBtn">🔄 новая игра</button>
        <div class="restart-hint">ПКМ · новая игра</div>
        <div class="hint">🖱️ <i>ЛКМ</i> · прицел</div>
    </div>
</div>
<script>
(function(){
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const statusSpan = document.getElementById('statusDisplay');
    const restartBtn = document.getElementById('restartBtn');
    const autoPlayBtn = document.getElementById('autoPlayBtn');
    const playerScoreSpan = document.getElementById('playerScore');
    const enemyScoreSpan = document.getElementById('enemyScore');
    const drawScoreSpan = document.getElementById('drawScore');
    
    const playerProbSlider = document.getElementById('playerProbSlider');
    const enemyProbSlider = document.getElementById('enemyProbSlider');
    const playerProbDisplay = document.getElementById('playerProbDisplay');
    const enemyProbDisplay = document.getElementById('enemyProbDisplay');

    const W = 900, H = 500;
    const RIVER_LEFT = 300;
    const RIVER_RIGHT = 600;

    let playerSmartDodgeProb = 0.93;
    let enemySmartDodgeProb = 0.93;

    playerProbSlider.addEventListener('input', () => {
        playerSmartDodgeProb = parseInt(playerProbSlider.value) / 100;
        playerProbDisplay.textContent = playerProbSlider.value;
    });
    enemyProbSlider.addEventListener('input', () => {
        enemySmartDodgeProb = parseInt(enemyProbSlider.value) / 100;
        enemyProbDisplay.textContent = enemyProbSlider.value;
    });

    let score = { player: 0, enemy: 0, draw: 0 };

    function updateScoreDisplay() {
        playerScoreSpan.textContent = score.player;
        enemyScoreSpan.textContent = score.enemy;
        drawScoreSpan.textContent = score.draw;
    }

    // ------ Звуки ------
    let audioCtx = null;
    let knifeSoundOsc = null;
    let knifeSoundGain = null;
    let knifeSoundActive = false;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function startKnifeSound() {
        try {
            initAudio();
            if (knifeSoundActive) return;
            knifeSoundActive = true;
            
            knifeSoundGain = audioCtx.createGain();
            knifeSoundGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            knifeSoundGain.connect(audioCtx.destination);
            
            knifeSoundOsc = audioCtx.createOscillator();
            knifeSoundOsc.type = 'sine';
            knifeSoundOsc.frequency.setValueAtTime(180, audioCtx.currentTime);
            knifeSoundOsc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.5);
            knifeSoundOsc.connect(knifeSoundGain);
            knifeSoundOsc.start();
            
            const bufferSize = audioCtx.sampleRate * 0.1;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / bufferSize * 2);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            noise.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            noise.start();
            noise.stop(audioCtx.currentTime + 0.5);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(240, audioCtx.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(160, audioCtx.currentTime + 0.5);
            gain2.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.5);
            
            scheduleKnifeModulation();
        } catch (_) {}
    }

    function scheduleKnifeModulation() {
        if (!knifeSoundActive) return;
        try {
            const now = audioCtx.currentTime;
            const gain = knifeSoundGain;
            if (gain) {
                for (let i = 0; i < 8; i++) {
                    const t = now + i * 0.04;
                    const val = 0.02 + 0.025 * (0.5 + 0.5 * Math.sin(i * 0.8));
                    gain.gain.setValueAtTime(val, t);
                }
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
            }
            if (knifeSoundOsc) {
                for (let i = 0; i < 8; i++) {
                    const t = now + i * 0.04;
                    const freq = 160 + 30 * Math.sin(i * 0.9);
                    knifeSoundOsc.frequency.setValueAtTime(freq, t);
                }
            }
        } catch (_) {}
    }

    function stopKnifeSound() {
        try {
            knifeSoundActive = false;
            if (knifeSoundOsc) {
                knifeSoundOsc.stop();
                knifeSoundOsc = null;
            }
            if (knifeSoundGain) {
                knifeSoundGain.disconnect();
                knifeSoundGain = null;
            }
        } catch (_) {}
    }

    function playStickSound() {
        try {
            initAudio();
            stopKnifeSound();
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(180, now);
            osc1.frequency.exponentialRampToValueAtTime(80, now + 0.08);
            gain1.gain.setValueAtTime(0.35, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            osc1.start(now);
            osc1.stop(now + 0.08);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(1200, now);
            osc2.frequency.exponentialRampToValueAtTime(300, now + 0.06);
            gain2.gain.setValueAtTime(0.12, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.start(now);
            osc2.stop(now + 0.06);
            
            const bufferSize = audioCtx.sampleRate * 0.05;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / bufferSize * 4);
            }
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            const gain3 = audioCtx.createGain();
            gain3.gain.setValueAtTime(0.15, now);
            gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
            noise.connect(gain3);
            gain3.connect(audioCtx.destination);
            noise.start(now);
            noise.stop(now + 0.05);
            
            const osc3 = audioCtx.createOscillator();
            const gain4 = audioCtx.createGain();
            osc3.type = 'sine';
            osc3.frequency.setValueAtTime(600, now + 0.02);
            osc3.frequency.exponentialRampToValueAtTime(200, now + 0.1);
            gain4.gain.setValueAtTime(0.06, now + 0.02);
            gain4.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
            osc3.connect(gain4);
            gain4.connect(audioCtx.destination);
            osc3.start(now + 0.02);
            osc3.stop(now + 0.1);
        } catch (_) {}
    }
    
    function playBounceSound() {
        try {
            initAudio();
            stopKnifeSound();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(320, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(140, audioCtx.currentTime + 0.12);
            gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.13);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.13);
        } catch (_) {}
    }
    function playThrowSound() {
        try {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(140, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
            startKnifeSound();
        } catch (_) {}
    }
    function playDeathSound() {
        try {
            initAudio();
            stopKnifeSound();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.6);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.6);
        } catch (_) {}
    }

    // ------ Константы ------
    const GRAVITY = 0.23;
    const ANGULAR_VEL = 0.45;
    const MAX_POWER = 13 * 1.5;
    const MIN_POWER = 2.5;
    const KNIFE_LENGTH = 38;
    const PLAYER_SIZE = 20;
    const THROW_COOLDOWN = 1000;
    const DANGER_ZONE = 350;
    const DANGER_DOT_THRESHOLD = 0.3;
    const PLAYER_SPEED = 3.2;

    // ------ Игроки ------
    let player = { x: 140, y: 380, alive: true, killed: false, prevX: 140, prevY: 380 };
    let enemy = { x: 760, y: 150, alive: true, killed: false, prevX: 760, prevY: 150 };

    // ------ ПОЗИЦИЯ МЫШИ (для управления) ------
    let mouseX = player.x;
    let mouseY = player.y;
    let isAiming = false;        // зажата ЛКМ
    let mouseInside = true;

    // ------ АНИМАЦИЯ РУК ------
    const ARM_EXTEND_SPEED = 0.125;
    const ARM_RETRACT_SPEED = 0.143;
    
    let playerArmProgress = 0;
    let enemyArmProgress = 0;
    let playerArmDirection = 0;
    let enemyArmDirection = 0;

    // ------ Ножи ------
    function createKnife() {
        return {
            active: false,
            x: 0, y: 0,
            prevX: 0, prevY: 0,
            vx: 0, vy: 0,
            angle: 0,
            stuck: false,
            bounce: false,
            fly: false,
            stuckOffset: { x: 0, y: 0 },
            owner: null,
            shouldDisappear: false,
            hasHit: false,
            soundStarted: false
        };
    }
    let playerKnife = createKnife();
    let enemyKnife = createKnife();

    let gameOver = false;
    let gameResult = null;
    let gameActive = false;
    let resolutionPending = false;
    let roundFinished = false;

    // ------ ГЛОБАЛЬНЫЕ ТАЙМЕРЫ БРОСКА ------
    let playerThrowTimer = { value: 0 };
    let enemyThrowTimer = { value: 0 };

    let autoPlayMode = false;
    let autoRestartTimer = 0;
    let isAutoRestarting = false;

    const AI_STATE = {
        PATROL: 'patrol',
        CALC_DODGE: 'calc_dodge',
        DODGING: 'dodging'
    };

    // Левый ИИ (для авторежима)
    let playerAIState = AI_STATE.PATROL;
    let playerDodgeTargetX = 0;
    let playerDodgeTargetY = 0;
    let playerAITimer = 0;
    let playerPatrolTargetX = 140;
    let playerPatrolTargetY = 380;

    // Правый ИИ (враг)
    let enemyAIState = AI_STATE.PATROL;
    let enemyDodgeTargetX = 0;
    let enemyDodgeTargetY = 0;
    let enemyPatrolTimer = 0;
    let enemyPatrolTargetX = 760;
    let enemyPatrolTargetY = 150;

    // Кулдауны
    let playerCooldown = 0;
    let enemyCooldown = 0;

    function resetGame() {
        player.alive = true;
        player.killed = false;
        player.prevX = player.x;
        player.prevY = player.y;
        enemy.alive = true;
        enemy.killed = false;
        enemy.prevX = enemy.x;
        enemy.prevY = enemy.y;
        gameOver = false;
        gameResult = null;
        resolutionPending = false;
        roundFinished = false;
        gameActive = true;
        statusSpan.innerText = 'дуэль';
        
        player.x = 140;
        player.y = 380;
        enemy.x = 760;
        enemy.y = 150;

        playerArmProgress = 0;
        enemyArmProgress = 0;
        playerArmDirection = 0;
        enemyArmDirection = 0;

        resetKnife(playerKnife, 'player');
        resetKnife(enemyKnife, 'enemy');
        
        playerThrowTimer.value = 0;
        enemyThrowTimer.value = 0;
        playerCooldown = 0;
        enemyCooldown = 0;
        
        playerAIState = AI_STATE.PATROL;
        enemyAIState = AI_STATE.PATROL;
        playerAITimer = 0;
        enemyPatrolTimer = 0;
        isAiming = false;
        
        stopKnifeSound();
    }

    function resetKnife(knife, owner) {
        knife.active = false;
        knife.stuck = false;
        knife.bounce = false;
        knife.fly = false;
        knife.shouldDisappear = false;
        knife.hasHit = false;
        knife.soundStarted = false;
        const from = owner === 'player' ? player : enemy;
        knife.x = from.x + (owner === 'player' ? -10 : 10);
        knife.y = from.y - 6;
        knife.prevX = knife.x;
        knife.prevY = knife.y;
        knife.vx = 0;
        knife.vy = 0;
        knife.angle = owner === 'player' ? -0.3 : Math.PI + 0.3;
        knife.stuckOffset = { x: 0, y: 0 };
        knife.owner = owner;
    }

    function checkAllKnivesSettled() {
        const playerDone = !playerKnife.fly && !playerKnife.bounce;
        const enemyDone = !enemyKnife.fly && !enemyKnife.bounce;
        return playerDone && enemyDone;
    }

    function resolveGame() {
        if (gameOver) return;
        
        const playerDead = !player.alive;
        const enemyDead = !enemy.alive;

        if (playerDead && enemyDead) {
            gameResult = 'draw';
            score.draw++;
            statusSpan.innerText = '⚖️ Ничья! Оба убиты';
            playDeathSound();
        } else if (playerDead) {
            gameResult = 'enemy';
            score.enemy++;
            statusSpan.innerText = '💀 Вы проиграли...';
            playDeathSound();
        } else if (enemyDead) {
            gameResult = 'player';
            score.player++;
            statusSpan.innerText = '🏆 Вы победили!';
            playDeathSound();
        } else {
            return;
        }

        updateScoreDisplay();
        gameOver = true;
        resolutionPending = false;
        roundFinished = true;
        stopKnifeSound();

        if (autoPlayMode) {
            isAutoRestarting = true;
            autoRestartTimer = 60;
        }
    }

    function clampPosition(entity) {
        if (entity === player) {
            entity.x = Math.max(40, Math.min(RIVER_LEFT - 10, entity.x));
        } else {
            entity.x = Math.max(RIVER_RIGHT + 10, Math.min(W - 40, entity.x));
        }
        entity.y = Math.max(50, Math.min(H - 40, entity.y));
    }

    function updateArmAnimation() {
        if (playerArmDirection === 1) {
            playerArmProgress += ARM_EXTEND_SPEED;
            if (playerArmProgress >= 1) {
                playerArmProgress = 1;
                playerArmDirection = -1;
            }
        } else if (playerArmDirection === -1) {
            playerArmProgress -= ARM_RETRACT_SPEED;
            if (playerArmProgress <= 0) {
                playerArmProgress = 0;
                playerArmDirection = 0;
            }
        }

        if (enemyArmDirection === 1) {
            enemyArmProgress += ARM_EXTEND_SPEED;
            if (enemyArmProgress >= 1) {
                enemyArmProgress = 1;
                enemyArmDirection = -1;
            }
        } else if (enemyArmDirection === -1) {
            enemyArmProgress -= ARM_RETRACT_SPEED;
            if (enemyArmProgress <= 0) {
                enemyArmProgress = 0;
                enemyArmDirection = 0;
            }
        }
    }

    function startThrowAnimation(owner) {
        if (owner === 'player') {
            playerArmDirection = 1;
            playerArmProgress = 0;
        } else {
            enemyArmDirection = 1;
            enemyArmProgress = 0;
        }
    }

    // ------ ФУНКЦИЯ ПРОВЕРКИ ОПАСНОСТИ ------
    function isKnifeDangerous(knife, target) {
        if (!knife.fly) return false;
        if (!target.alive) return false;
        
        const dx = knife.x - target.x;
        const dy = knife.y - target.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist > DANGER_ZONE) return false;
        
        const speed = Math.hypot(knife.vx, knife.vy);
        if (speed < 0.5) return false;
        
        const normX = knife.vx / speed;
        const normY = knife.vy / speed;
        
        const toTargetX = target.x - knife.x;
        const toTargetY = target.y - knife.y;
        const toTargetDist = Math.hypot(toTargetX, toTargetY);
        if (toTargetDist < 1) return false;
        
        const toTargetNormX = toTargetX / toTargetDist;
        const toTargetNormY = toTargetY / toTargetDist;
        
        const dot = normX * toTargetNormX + normY * toTargetNormY;
        
        return dot > DANGER_DOT_THRESHOLD;
    }

    // ------ ФУНКЦИЯ ВЫЧИСЛЕНИЯ ТОЧКИ УКЛОНЕНИЯ ------
    function calculateDodgePoint(knife, self, isSmart) {
        const minX = self === player ? 40 : RIVER_RIGHT + 10;
        const maxX = self === player ? RIVER_LEFT - 10 : W - 40;
        const minY = 50;
        const maxY = H - 40;
        
        if (isSmart && knife.fly) {
            const speed = Math.hypot(knife.vx, knife.vy);
            if (speed > 0.5) {
                const normX = knife.vx / speed;
                const normY = knife.vy / speed;
                
                const dodgeDistance = 120 + Math.random() * 60;
                const perpX = -normY;
                const perpY = normX;
                
                let targetX1 = self.x + perpX * dodgeDistance;
                let targetY1 = self.y + perpY * dodgeDistance;
                let targetX2 = self.x - perpX * dodgeDistance;
                let targetY2 = self.y - perpY * dodgeDistance;
                
                targetX1 = Math.max(minX, Math.min(maxX, targetX1));
                targetY1 = Math.max(minY, Math.min(maxY, targetY1));
                targetX2 = Math.max(minX, Math.min(maxX, targetX2));
                targetY2 = Math.max(minY, Math.min(maxY, targetY2));
                
                const dist1 = Math.abs((targetX1 - knife.x) * normX + (targetY1 - knife.y) * normY);
                const dist2 = Math.abs((targetX2 - knife.x) * normX + (targetY2 - knife.y) * normY);
                
                let targetX, targetY;
                if (dist1 > dist2) {
                    targetX = targetX1;
                    targetY = targetY1;
                } else {
                    targetX = targetX2;
                    targetY = targetY2;
                }
                
                if (Math.hypot(targetX - self.x, targetY - self.y) < 50) {
                    targetX += (Math.random() - 0.5) * 80;
                    targetY += (Math.random() - 0.5) * 80;
                    targetX = Math.max(minX, Math.min(maxX, targetX));
                    targetY = Math.max(minY, Math.min(maxY, targetY));
                }
                
                return { x: targetX, y: targetY };
            }
        }
        
        let targetX, targetY;
        let attempts = 0;
        do {
            targetX = minX + Math.random() * (maxX - minX);
            targetY = minY + Math.random() * (maxY - minY);
            attempts++;
        } while (Math.hypot(targetX - self.x, targetY - self.y) < 80 && attempts < 20);
        
        return { x: targetX, y: targetY };
    }

    // ------ ФУНКЦИЯ БРОСКА (общая) ------
    function performThrow(owner, enemyRef, selfRef, angleShift) {
        const self = selfRef;
        const enemy = enemyRef;
        
        const dx = enemy.x - self.x;
        const dy = enemy.y - self.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist > 50) {
            const estimatedSpeed = 5 + Math.random() * 5;
            const travelTime = dist / estimatedSpeed;
            
            const enemySpeedX = enemy.x - enemy.prevX || 0;
            const enemySpeedY = enemy.y - enemy.prevY || 0;
            
            let predictedX = enemy.x + enemySpeedX * travelTime * 1.0;
            let predictedY = enemy.y + enemySpeedY * travelTime * 1.0;
            
            if (owner === 'player') {
                predictedX = Math.max(RIVER_RIGHT + 10, Math.min(W - 40, predictedX));
            } else {
                predictedX = Math.max(40, Math.min(RIVER_LEFT - 10, predictedX));
            }
            predictedY = Math.max(50, Math.min(H - 40, predictedY));
            
            const aimDx = predictedX - self.x;
            const aimDy = predictedY - self.y;
            const aimDist = Math.hypot(aimDx, aimDy);
            
            if (aimDist > 30) {
                let rawAngle = Math.atan2(aimDy, aimDx);
                const spread = 0.04;
                rawAngle += (Math.random() - 0.5) * spread;
                const finalAngle = rawAngle + angleShift;
                
                const power = Math.min(3 + aimDist / 25, MAX_POWER);
                
                const knife = owner === 'player' ? playerKnife : enemyKnife;
                throwKnife(knife, owner, power, finalAngle);
                
                return true;
            }
        }
        return false;
    }

    // ------ ФУНКЦИЯ ПРОВЕРКИ ВРЕМЕНИ БРОСКА (общая) ------
    function checkAndThrow(owner, enemyRef, selfRef, angleShift, throwTimerRef) {
        const knife = owner === 'player' ? playerKnife : enemyKnife;
        const cooldown = owner === 'player' ? playerCooldown : enemyCooldown;
        
        if (cooldown > 0) return false;
        if (knife.fly || knife.stuck || knife.bounce) return false;
        if (!selfRef.alive || !enemyRef.alive) return false;
        
        throwTimerRef.value++;
        
        if (throwTimerRef.value > 30 + Math.random() * 40) {
            const thrown = performThrow(owner, enemyRef, selfRef, angleShift);
            if (thrown) {
                throwTimerRef.value = 0;
                return true;
            }
        }
        return false;
    }

    // ------ ИИ ДЛЯ ИГРОКА (левый, авторежим) ------
    function calcPlayerAngleShift() {
        return -10 * Math.PI / 180;
    }

    function updatePlayerAI() {
        if (!autoPlayMode || gameOver || !player.alive || !gameActive) return;
        if (!enemy.alive) return;

        if (playerCooldown > 0) {
            playerCooldown -= 16.67;
            if (playerCooldown < 0) playerCooldown = 0;
        }

        checkAndThrow('player', enemy, player, calcPlayerAngleShift(), playerThrowTimer);

        switch (playerAIState) {
            case AI_STATE.PATROL: {
                if (isKnifeDangerous(enemyKnife, player)) {
                    playerAIState = AI_STATE.CALC_DODGE;
                    break;
                }
                
                playerAITimer++;
                if (playerAITimer > 120) {
                    playerAITimer = 0;
                    const angleToEnemy = Math.atan2(enemy.y - player.y, enemy.x - player.x);
                    const targetDist = 250 + Math.random() * 200;
                    let targetX = enemy.x - Math.cos(angleToEnemy) * targetDist;
                    let targetY = enemy.y - Math.sin(angleToEnemy) * targetDist;
                    targetX = Math.max(40, Math.min(RIVER_LEFT - 10, targetX));
                    targetY = Math.max(50, Math.min(H - 40, targetY));
                    playerPatrolTargetX = targetX;
                    playerPatrolTargetY = targetY;
                }
                
                const speed = 1.6;
                const dx = playerPatrolTargetX - player.x;
                const dy = playerPatrolTargetY - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 5) {
                    player.x += (dx / dist) * speed;
                    player.y += (dy / dist) * speed;
                }
                clampPosition(player);
                break;
            }
            
            case AI_STATE.CALC_DODGE: {
                const isSmart = Math.random() < playerSmartDodgeProb;
                const point = calculateDodgePoint(enemyKnife, player, isSmart);
                playerDodgeTargetX = point.x;
                playerDodgeTargetY = point.y;
                playerAIState = AI_STATE.DODGING;
                break;
            }
            
            case AI_STATE.DODGING: {
                const dx = playerDodgeTargetX - player.x;
                const dy = playerDodgeTargetY - player.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 5) {
                    playerAIState = AI_STATE.PATROL;
                } else {
                    const speed = 2.5;
                    player.x += (dx / dist) * speed;
                    player.y += (dy / dist) * speed;
                    clampPosition(player);
                }
                break;
            }
        }
    }

    // ------ Обычный ИИ (враг) ------
    function calcEnemyAngleShift() {
        return 10 * Math.PI / 180;
    }

    function updateEnemyAI() {
        if (!enemy.alive || gameOver || !player.alive || !gameActive) return;

        if (enemyCooldown > 0) {
            enemyCooldown -= 16.67;
            if (enemyCooldown < 0) enemyCooldown = 0;
        }

        checkAndThrow('enemy', player, enemy, calcEnemyAngleShift(), enemyThrowTimer);

        switch (enemyAIState) {
            case AI_STATE.PATROL: {
                if (isKnifeDangerous(playerKnife, enemy)) {
                    enemyAIState = AI_STATE.CALC_DODGE;
                    break;
                }
                
                enemyPatrolTimer++;
                if (enemyPatrolTimer > 120) {
                    enemyPatrolTimer = 0;
                    const angleToPlayer = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                    const targetDist = 250 + Math.random() * 200;
                    let targetX = player.x - Math.cos(angleToPlayer) * targetDist;
                    let targetY = player.y - Math.sin(angleToPlayer) * targetDist;
                    targetX = Math.max(RIVER_RIGHT + 10, Math.min(W - 40, targetX));
                    targetY = Math.max(50, Math.min(H - 40, targetY));
                    enemyPatrolTargetX = targetX;
                    enemyPatrolTargetY = targetY;
                }
                
                const speed = 1.6;
                const dx = enemyPatrolTargetX - enemy.x;
                const dy = enemyPatrolTargetY - enemy.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 5) {
                    enemy.x += (dx / dist) * speed;
                    enemy.y += (dy / dist) * speed;
                }
                clampPosition(enemy);
                break;
            }
            
            case AI_STATE.CALC_DODGE: {
                const isSmart = Math.random() < enemySmartDodgeProb;
                const point = calculateDodgePoint(playerKnife, enemy, isSmart);
                enemyDodgeTargetX = point.x;
                enemyDodgeTargetY = point.y;
                enemyAIState = AI_STATE.DODGING;
                break;
            }
            
            case AI_STATE.DODGING: {
                const dx = enemyDodgeTargetX - enemy.x;
                const dy = enemyDodgeTargetY - enemy.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 5) {
                    enemyAIState = AI_STATE.PATROL;
                } else {
                    const speed = 2.5;
                    enemy.x += (dx / dist) * speed;
                    enemy.y += (dy / dist) * speed;
                    clampPosition(enemy);
                }
                break;
            }
        }
    }

    function throwKnife(knife, owner, power, angleRad) {
        if (gameOver || !gameActive) return;
        if (knife.fly || knife.stuck || knife.bounce) {
            resetKnife(knife, owner);
        }

        const cooldown = owner === 'player' ? playerCooldown : enemyCooldown;
        if (cooldown > 0) return;

        startThrowAnimation(owner);

        let speed = Math.min(power, MAX_POWER);
        speed = Math.max(speed, MIN_POWER);

        const fromX = owner === 'player' ? player.x : enemy.x;
        const fromY = owner === 'player' ? player.y : enemy.y;

        knife.active = true;
        knife.fly = true;
        knife.stuck = false;
        knife.bounce = false;
        knife.shouldDisappear = false;
        knife.hasHit = false;
        knife.soundStarted = false;
        knife.x = fromX + 8 * Math.cos(angleRad);
        knife.y = fromY + 8 * Math.sin(angleRad);
        knife.prevX = knife.x;
        knife.prevY = knife.y;
        knife.vx = Math.cos(angleRad) * speed;
        knife.vy = Math.sin(angleRad) * speed;
        knife.angle = angleRad + (owner === 'player' ? Math.PI/2 : -Math.PI/2);
        knife.stuckOffset = { x: 0, y: 0 };
        knife.owner = owner;
        playThrowSound();
        
        if (owner === 'player') {
            playerCooldown = THROW_COOLDOWN;
        } else {
            enemyCooldown = THROW_COOLDOWN;
        }
    }

    // ------ БРОСОК ОТ ИГРОКА (по ЛКМ) ------
    function playerThrow() {
        if (gameOver || !gameActive) return;
        if (!player.alive) return;
        if (playerCooldown > 0) return;
        if (playerKnife.fly || playerKnife.stuck || playerKnife.bounce) return;
        
        // Вычисляем направление и силу от персонажа к курсору
        const dx = mouseX - player.x;
        const dy = mouseY - (player.y - 10);
        const dist = Math.hypot(dx, dy);
        
        if (dist < 10) return; // слишком коротко
        
        const angle = Math.atan2(dy, dx);
        const power = Math.min(dist / 12, MAX_POWER);
        
        throwKnife(playerKnife, 'player', power, angle);
        playerThrowTimer.value = 0;
    }

    // ------ ОБНОВЛЕНИЕ ДВИЖЕНИЯ ИГРОКА (следование за мышью) ------
    function updatePlayerMovement() {
        if (!player.alive || gameOver || !gameActive) return;
        if (autoPlayMode) return;
        if (isAiming) return; // заморожен во время прицеливания
        if (!mouseInside) return;
        
        const dx = mouseX - player.x;
        const dy = mouseY - player.y;
        const dist = Math.hypot(dx, dy);
        
        if (dist > 3) {
            const speed = PLAYER_SPEED;
            player.x += (dx / dist) * speed;
            player.y += (dy / dist) * speed;
        }
        clampPosition(player);
        
        // Обновляем кулдаун
        if (playerCooldown > 0) {
            playerCooldown -= 16.67;
            if (playerCooldown < 0) playerCooldown = 0;
        }
        
        // Обновляем анимацию рук (если не в режиме прицеливания)
        if (!isAiming) {
            updateArmAnimation();
        }
    }

    function lineIntersectsRect(x1, y1, x2, y2, rx, ry, rw, rh) {
        const inside1 = (x1 >= rx && x1 <= rx + rw && y1 >= ry && y1 <= ry + rh);
        const inside2 = (x2 >= rx && x2 <= rx + rw && y2 >= ry && y2 <= ry + rh);
        if (inside1 || inside2) return true;

        if (x1 < rx && x2 >= rx) {
            const t = (rx - x1) / (x2 - x1);
            const y = y1 + t * (y2 - y1);
            if (y >= ry && y <= ry + rh) return true;
        }
        if (x1 < rx + rw && x2 >= rx + rw) {
            const t = (rx + rw - x1) / (x2 - x1);
            const y = y1 + t * (y2 - y1);
            if (y >= ry && y <= ry + rh) return true;
        }
        if (y1 < ry && y2 >= ry) {
            const t = (ry - y1) / (y2 - y1);
            const x = x1 + t * (y2 - y1);
            if (x >= rx && x <= rx + rw) return true;
        }
        if (y1 < ry + rh && y2 >= ry + rh) {
            const t = (ry + rh - y1) / (y2 - y1);
            const x = x1 + t * (y2 - y1);
            if (x >= rx && x <= rx + rw) return true;
        }
        return false;
    }

    function checkKnifeHit(knife, target, targetName) {
        if (!knife.fly || knife.stuck || knife.bounce) return false;
        if (!target.alive) return false;
        if (knife.hasHit) return false;

        const bodyCenterY = target.y - 8;
        const hitTop = bodyCenterY - 22;
        const hitBottom = bodyCenterY;
        const hitLeft = target.x - 18;
        const hitRight = target.x + 18;

        const tipX = knife.x + Math.cos(knife.angle) * KNIFE_LENGTH * 0.7;
        const tipY = knife.y + Math.sin(knife.angle) * KNIFE_LENGTH * 0.7;
        const prevTipX = knife.prevX + Math.cos(knife.angle) * KNIFE_LENGTH * 0.7;
        const prevTipY = knife.prevY + Math.sin(knife.angle) * KNIFE_LENGTH * 0.7;

        const inHitZone = (px, py) => {
            return px >= hitLeft && px <= hitRight && py >= hitTop && py <= hitBottom;
        };

        const hitNow = inHitZone(knife.x, knife.y) || inHitZone(tipX, tipY);
        const hitTrajectory = lineIntersectsRect(
            knife.prevX, knife.prevY, knife.x, knife.y,
            hitLeft, hitTop, hitRight - hitLeft, hitBottom - hitTop
        ) || lineIntersectsRect(
            prevTipX, prevTipY, tipX, tipY,
            hitLeft, hitTop, hitRight - hitLeft, hitBottom - hitTop
        );

        const hit = hitNow || hitTrajectory;
        if (!hit) return false;

        knife.hasHit = true;

        let normalizedAngle = knife.angle % (2 * Math.PI);
        if (normalizedAngle > Math.PI) normalizedAngle -= 2 * Math.PI;
        if (normalizedAngle < -Math.PI) normalizedAngle += 2 * Math.PI;

        let targetAngle = knife.owner === 'player' ? 0 : Math.PI;
        if (targetAngle > Math.PI) targetAngle -= 2 * Math.PI;
        if (targetAngle < -Math.PI) targetAngle += 2 * Math.PI;
        
        let diff = normalizedAngle - targetAngle;
        if (diff > Math.PI) diff -= 2 * Math.PI;
        if (diff < -Math.PI) diff += 2 * Math.PI;
        
        const threshold = Math.PI / 4;
        if (Math.abs(diff) <= threshold) {
            knife.stuck = true;
            knife.fly = false;
            knife.active = true;
            knife.stuckOffset.x = knife.x - target.x;
            knife.stuckOffset.y = knife.y - target.y;
            knife.angle = targetAngle;
            
            target.alive = false;
            target.killed = true;
            playStickSound();
            
            if (checkAllKnivesSettled()) {
                resolveGame();
            } else {
                resolutionPending = true;
                statusSpan.innerText = '⏳ ожидание...';
            }
            return true;
        } else {
            playBounceSound();
            knife.shouldDisappear = true;
            knife.fly = false;
            knife.active = false;
            resetKnife(knife, knife.owner);
            
            if (checkAllKnivesSettled()) {
                resolveGame();
            }
            return true;
        }
    }

    function updateKnifePhysics(knife) {
        if (!knife.fly) return;

        knife.prevX = knife.x;
        knife.prevY = knife.y;

        knife.vy += GRAVITY;
        knife.x += knife.vx;
        knife.y += knife.vy;
        knife.angle += ANGULAR_VEL * (knife.owner === 'player' ? 1 : -1);

        if (knife.owner === 'player') {
            checkKnifeHit(knife, enemy, 'enemy');
        } else {
            checkKnifeHit(knife, player, 'player');
        }

        if (!knife.stuck && !knife.bounce && knife.active) {
            if (knife.x > W + 40 || knife.x < -40 || knife.y > H + 60 || knife.y < -40) {
                knife.fly = false;
                knife.active = false;
                resetKnife(knife, knife.owner);
                if (checkAllKnivesSettled()) {
                    resolveGame();
                }
            }
            if (knife.y > H - 10 && knife.vy > 0) {
                knife.fly = false;
                knife.active = false;
                resetKnife(knife, knife.owner);
                if (checkAllKnivesSettled()) {
                    resolveGame();
                }
            }
        }
    }

    // ------ АНИМАЦИЯ РЕКИ ------
    let riverTime = 0;

    function drawRiver() {
        riverTime += 0.02;
        
        ctx.save();
        
        const gradient = ctx.createLinearGradient(RIVER_LEFT, 0, RIVER_RIGHT, 0);
        gradient.addColorStop(0, 'rgba(30, 80, 160, 0.25)');
        gradient.addColorStop(0.15, 'rgba(40, 120, 200, 0.45)');
        gradient.addColorStop(0.3, 'rgba(50, 150, 220, 0.55)');
        gradient.addColorStop(0.5, 'rgba(60, 170, 230, 0.6)');
        gradient.addColorStop(0.7, 'rgba(50, 150, 220, 0.55)');
        gradient.addColorStop(0.85, 'rgba(40, 120, 200, 0.45)');
        gradient.addColorStop(1, 'rgba(30, 80, 160, 0.25)');
        ctx.fillStyle = gradient;
        ctx.fillRect(RIVER_LEFT, 0, RIVER_RIGHT - RIVER_LEFT, H);
        
        for (let i = 0; i < 8; i++) {
            const baseX = RIVER_LEFT + 30 + i * 35 + Math.sin(riverTime * 1.5 + i * 1.2) * 15;
            const baseY = 30 + i * 55 + Math.sin(riverTime * 0.7 + i * 0.9) * 20;
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.1)';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.beginPath();
            ctx.ellipse(baseX, baseY, 20 + Math.sin(riverTime + i) * 8, 6 + Math.sin(riverTime * 0.5 + i * 1.3) * 3, 0.2, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.shadowBlur = 0;
        for (let layer = 0; layer < 3; layer++) {
            ctx.strokeStyle = `rgba(200, 235, 255, ${0.08 + layer * 0.04})`;
            ctx.lineWidth = 2 - layer * 0.4;
            const offset = layer * 15;
            const speed = 1.2 + layer * 0.3;
            
            for (let i = 0; i < 14; i++) {
                const y = 15 + i * 35 + offset + Math.sin(riverTime * speed + i * 0.7 + layer) * 8;
                ctx.beginPath();
                ctx.moveTo(RIVER_LEFT + 5, y);
                for (let x = RIVER_LEFT + 5; x < RIVER_RIGHT - 5; x += 6) {
                    const waveY = y + Math.sin(x * 0.04 + riverTime * speed + i * 0.5 + layer * 2) * 5;
                    ctx.lineTo(x, waveY);
                }
                ctx.stroke();
            }
        }
        
        for (let i = 0; i < 15; i++) {
            const bubbleX = RIVER_LEFT + 20 + (i * 37 + Math.sin(riverTime * 0.5 + i * 2.3) * 20) % (RIVER_RIGHT - RIVER_LEFT - 40);
            const bubbleY = (i * 33 + Math.sin(riverTime * 0.8 + i * 1.7) * 25) % H;
            ctx.fillStyle = `rgba(255, 255, 255, ${0.03 + Math.sin(riverTime + i) * 0.02 + 0.02})`;
            ctx.beginPath();
            ctx.arc(bubbleX, bubbleY, 2 + Math.sin(riverTime * 0.3 + i) * 1, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.restore();
    }

    // ------ ОТРИСОВКА ------
    function draw() {
        ctx.clearRect(0, 0, W, H);

        drawRiver();

        ctx.save();
        ctx.strokeStyle = 'rgba(180, 210, 160, 0.5)';
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 12]);
        ctx.beginPath();
        ctx.moveTo(RIVER_LEFT, 0);
        ctx.lineTo(RIVER_LEFT, H);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(RIVER_RIGHT, 0);
        ctx.lineTo(RIVER_RIGHT, H);
        ctx.stroke();
        ctx.restore();

        drawPlayer(player, '#3a7a3a', '#5a9a5a', 'Вы', playerArmProgress, 1);
        drawPlayer(enemy, '#7a3a3a', '#9a5a5a', 'ИИ', enemyArmProgress, -1);

        drawKnife(playerKnife);
        drawKnife(enemyKnife);

        // ★★★ ЛИНИЯ ПРИЦЕЛА ★★★
        if (isAiming && player.alive && !gameOver && gameActive && !autoPlayMode) {
            ctx.save();
            ctx.setLineDash([6, 10]);
            ctx.strokeStyle = '#f5f0c0';
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#202f1a';
            ctx.beginPath();
            ctx.moveTo(player.x, player.y-10);
            ctx.lineTo(mouseX, mouseY);
            ctx.stroke();
            ctx.restore();
            
            // Кружок на конце прицела
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 5, 0, 2*Math.PI);
            ctx.fillStyle = '#f5ea9e';
            ctx.shadowBlur = 14;
            ctx.shadowColor = '#2f3f20';
            ctx.fill();
        }

        // ★★★ КУРСОР ★★★
        ctx.save();
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#00000044';
        ctx.strokeStyle = isAiming ? '#ff6666' : '#88dd88';
        ctx.lineWidth = 2;
        const cs = 10;
        ctx.beginPath();
        ctx.moveTo(mouseX - cs, mouseY);
        ctx.lineTo(mouseX + cs, mouseY);
        ctx.moveTo(mouseX, mouseY - cs);
        ctx.lineTo(mouseX, mouseY + cs);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(mouseX, mouseY, 4, 0, 2*Math.PI);
        ctx.strokeStyle = isAiming ? '#ff666688' : '#88dd8888';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();

        ctx.font = 'bold 18px "Segoe UI", system-ui';
        ctx.fillStyle = '#1f2a18';
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#b0c8a0';
        ctx.fillText('⚔️', 20, 40);
    }

    function drawPlayer(p, color, lightColor, label, armProgress, direction) {
        ctx.save();
        const x = p.x, y = p.y;
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#0f1f0a';
        
        ctx.fillStyle = p.alive ? color : '#444';
        ctx.strokeStyle = '#1f2f1a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(x, y-8, 16, 22, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.stroke();
        
        ctx.beginPath();
        ctx.arc(x, y-32, 12, 0, Math.PI*2);
        ctx.fillStyle = p.alive ? '#dbb07b' : '#887';
        ctx.stroke();
        ctx.fill();
        
        if (p.alive) {
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(x-5, y-34, 2.5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+5, y-34, 2.5, 0, Math.PI*2);
            ctx.fill();
        }

        if (p.alive) {
            ctx.strokeStyle = '#dbb07b';
            ctx.lineWidth = 7;
            ctx.lineCap = 'round';
            
            const maxReach = 28;
            const currentReach = 10 + armProgress * (maxReach - 10);
            
            const startAngle = direction === 1 ? -0.3 : Math.PI + 0.3;
            const endAngle = direction === 1 ? 0.2 : Math.PI - 0.2;
            const currentAngle = startAngle + armProgress * (endAngle - startAngle);
            
            const shoulderX = x + (direction === 1 ? 12 : -12);
            const shoulderY = y - 22;
            
            const handX = shoulderX + Math.cos(currentAngle) * currentReach;
            const handY = shoulderY + Math.sin(currentAngle) * currentReach;
            
            ctx.beginPath();
            ctx.moveTo(shoulderX, shoulderY);
            ctx.lineTo(handX, handY);
            ctx.stroke();
            
            if (!p.killed) {
                ctx.save();
                ctx.translate(handX, handY);
                ctx.rotate(currentAngle + (direction === 1 ? -0.3 : Math.PI + 0.3));
                ctx.fillStyle = '#aaa';
                ctx.fillRect(0, -1.5, 10, 3);
                ctx.fillStyle = '#666';
                ctx.fillRect(10, -2, 6, 4);
                ctx.restore();
            }
        }

        ctx.restore();
    }

    function drawKnife(knife) {
        if (!knife.active && !knife.fly && !knife.stuck && !knife.bounce) return;
        if (knife.shouldDisappear) return;
        ctx.save();
        ctx.translate(knife.x, knife.y);
        ctx.rotate(knife.angle);
        ctx.shadowBlur = 14;
        ctx.shadowColor = '#142010';
        ctx.fillStyle = '#3e2b1a';
        ctx.strokeStyle = '#1f140c';
        ctx.lineWidth = 2;
        ctx.fillRect(-6, -4, 18, 8);
        ctx.strokeRect(-6, -4, 18, 8);
        ctx.fillStyle = '#e8eef0';
        ctx.strokeStyle = '#4a5a5a';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(16, -6);
        ctx.lineTo(34, -2);
        ctx.lineTo(34, 2);
        ctx.lineTo(16, 6);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.fillStyle = '#b0c0c0';
        ctx.beginPath();
        ctx.moveTo(30, -3);
        ctx.lineTo(38, 0);
        ctx.lineTo(30, 3);
        ctx.fill();
        ctx.restore();
    }

    // ------ ОСНОВНОЙ ЦИКЛ ------
    function gameLoop() {
        // Сохраняем предыдущие позиции для предсказания
        if (gameActive && !gameOver) {
            player.prevX = player.x;
            player.prevY = player.y;
            enemy.prevX = enemy.x;
            enemy.prevY = enemy.y;
        }

        // Авторестарт
        if (isAutoRestarting && autoPlayMode) {
            autoRestartTimer--;
            if (autoRestartTimer <= 0) {
                isAutoRestarting = false;
                resetGame();
                statusSpan.innerText = 'дуэль (авто)';
            }
        }

        if (gameActive && !gameOver) {
            // Движение игрока (следование за мышью)
            if (!autoPlayMode) {
                updatePlayerMovement();
            }
            
            // ИИ
            if (autoPlayMode) {
                updatePlayerAI();
            }
            updateEnemyAI();
            
            // Физика ножей
            if (playerKnife.fly) {
                updateKnifePhysics(playerKnife);
            }
            if (enemyKnife.fly) {
                updateKnifePhysics(enemyKnife);
            }

            // Разрешение исхода
            if (checkAllKnivesSettled() && !gameOver && resolutionPending) {
                resolveGame();
            }
            
            // Анимация рук в авторежиме
            if (autoPlayMode) {
                if (playerCooldown > 0) {
                    playerCooldown -= 16.67;
                    if (playerCooldown < 0) playerCooldown = 0;
                }
                updateArmAnimation();
            }
        }

        draw();
        requestAnimationFrame(gameLoop);
    }

    // ------ СОБЫТИЯ МЫШИ ------
    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top) * scaleY
        };
    }

    canvas.addEventListener('mousemove', (e) => {
        const pos = getMousePos(e);
        mouseX = Math.max(0, Math.min(W, pos.x));
        mouseY = Math.max(0, Math.min(H, pos.y));
        mouseInside = true;
    });

    canvas.addEventListener('mouseenter', () => {
        mouseInside = true;
    });

    canvas.addEventListener('mouseleave', () => {
        mouseInside = false;
    });

    // ★★★ ЛКМ: прицеливание и бросок ★★★
    canvas.addEventListener('mousedown', (e) => {
        if (e.button !== 0) return;
        if (gameOver || !gameActive) return;
        if (!player.alive) return;
        if (autoPlayMode) return;
        if (playerCooldown > 0) return;
        if (playerKnife.fly || playerKnife.stuck || playerKnife.bounce) return;
        
        // Входим в режим прицеливания
        isAiming = true;
        initAudio();
    });

    canvas.addEventListener('mouseup', (e) => {
        if (e.button !== 0) return;
        if (!isAiming) return;
        
        // Выходим из режима прицеливания и бросаем нож
        isAiming = false;
        playerThrow();
    });

    // ★★★ ПКМ: начало новой игры ★★★
    canvas.addEventListener('contextmenu', (e) => {
        e.preventDefault(); // отключаем контекстное меню
        
        // Выполняем те же действия, что и кнопка "Новая игра"
        if (autoPlayMode) {
            autoPlayMode = false;
            autoPlayBtn.textContent = '🤖 автоигра';
            autoPlayBtn.classList.remove('active');
            isAutoRestarting = false;
        }
        resetGame();
        resetKnife(playerKnife, 'player');
        resetKnife(enemyKnife, 'enemy');
        playerThrowTimer.value = 0;
        enemyThrowTimer.value = 0;
        playerCooldown = 0;
        enemyCooldown = 0;
        playerAIState = AI_STATE.PATROL;
        enemyAIState = AI_STATE.PATROL;
        statusSpan.innerText = 'дуэль';
        gameActive = true;
        resolutionPending = false;
        roundFinished = false;
        isAiming = false;
        stopKnifeSound();
    });

    // Отмена прицеливания при выходе мыши с канваса
    canvas.addEventListener('mouseleave', () => {
        if (isAiming) {
            isAiming = false;
        }
    });

    // ------ КНОПКИ ------
    restartBtn.addEventListener('click', () => {
        if (autoPlayMode) {
            autoPlayMode = false;
            autoPlayBtn.textContent = '🤖 автоигра';
            autoPlayBtn.classList.remove('active');
            isAutoRestarting = false;
        }
        resetGame();
        resetKnife(playerKnife, 'player');
        resetKnife(enemyKnife, 'enemy');
        playerThrowTimer.value = 0;
        enemyThrowTimer.value = 0;
        playerCooldown = 0;
        enemyCooldown = 0;
        playerAIState = AI_STATE.PATROL;
        enemyAIState = AI_STATE.PATROL;
        statusSpan.innerText = 'дуэль';
        gameActive = true;
        resolutionPending = false;
        roundFinished = false;
        isAiming = false;
        stopKnifeSound();
    });

    autoPlayBtn.addEventListener('click', () => {
        initAudio();
        autoPlayMode = !autoPlayMode;
        if (autoPlayMode) {
            autoPlayBtn.textContent = '⏹️ стоп';
            autoPlayBtn.classList.add('active');
            statusSpan.innerText = '🤖 автоигра';
            if (!gameActive || gameOver) {
                resetGame();
                playerAIState = AI_STATE.PATROL;
                enemyAIState = AI_STATE.PATROL;
                isAutoRestarting = false;
            }
            playerCooldown = 0;
            enemyCooldown = 0;
            isAiming = false;
        } else {
            autoPlayBtn.textContent = '🤖 автоигра';
            autoPlayBtn.classList.remove('active');
            statusSpan.innerText = 'дуэль';
            isAutoRestarting = false;
            stopKnifeSound();
        }
    });

    canvas.addEventListener('click', () => {
        initAudio();
    });

    // ------ ЗАПУСК ------
    gameActive = false;
    statusSpan.innerText = 'нажмите "Новая игра"';
    updateScoreDisplay();
    gameLoop();
})();
</script>
